<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservar Equipos — PropTools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="../components.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:       #1B6EF3;
    --blue-light: #EBF2FF;
    --blue-dark:  #1258CC;
    --ink:        #0D0F12;
    --ink-mid:    #5A6070;
    --ink-light:  #8C95A6;
    --surface:    #fff;
    --surface2:   #F4F5F7;
    --border:     #E2E5EA;
    --green:      #16A34A;
    --green-light:#F0FDF4;
    --red:        #DC2626;
    --red-light:  #FEF2F2;
    --amber:      #D97706;
    --amber-light:#FFFBEB;
    --radius:     10px;
    --shadow-sm:  0 1px 3px rgba(13,15,18,.06), 0 1px 2px rgba(13,15,18,.04);
    --grad-start: #FF3A5C;
    --grad-mid:   #C044E8;
    --grad-end:   #5B4FE8;
  }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--surface2);
    display: flex;
    flex-direction: column;
  }



  /* padding handled by #pt-main from components.js */

  /* ── PAGE HEADER ─────────────────────────────── */
  .page-header { margin-bottom: 32px; }

  .page-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.4px;
    margin-bottom: 4px;
  }

  .page-subtitle { color: var(--ink-mid); font-size: 14px; }

  /* ── CARD ────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }

  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
  .card-subtitle { font-size: 13px; color: var(--ink-mid); margin-top: 2px; }
  .card-body { padding: 24px; }

  /* ── LAYOUT ──────────────────────────────────── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 1100px) { .two-col { grid-template-columns: 1fr; } }
  @media (max-width: 820px)  { main { padding: 24px 20px; } }

  /* ── CALENDAR ────────────────────────────────── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .cal-month { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }

  .cal-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink); font-size: 16px;
    transition: all .15s;
  }
  .cal-btn:hover { background: var(--surface2); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 16px 12px;
    gap: 3px;
  }

  .cal-dow {
    text-align: center;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    color: var(--ink-light);
    text-transform: uppercase;
    padding: 4px 0 12px;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .12s;
    position: relative;
    user-select: none;
  }

  .cal-day:hover:not(.cal-empty):not(.cal-past) {
    background: var(--blue-light);
    color: var(--blue);
  }

  .cal-day.cal-empty { cursor: default; }
  .cal-day.cal-past  { color: #D1D5DB; cursor: not-allowed; }

  .cal-day.cal-today {
    background: var(--surface2);
    font-weight: 700;
  }

  .cal-day.cal-selected {
    background: var(--blue);
    color: white;
    font-weight: 600;
  }

  .cal-day.cal-in-range {
    background: var(--blue-light);
    color: var(--blue);
    border-radius: 0;
  }

  .cal-day.cal-range-start {
    background: var(--blue);
    color: white;
    border-radius: 8px 0 0 8px;
  }

  .cal-day.cal-range-end {
    background: var(--blue);
    color: white;
    border-radius: 0 8px 8px 0;
  }

  .cal-day.has-reserva::after {
    content: '';
    position: absolute;
    bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--blue-light);
    border: 1.5px solid var(--blue);
  }

  .cal-day.cal-selected.has-reserva::after,
  .cal-day.cal-range-start.has-reserva::after,
  .cal-day.cal-range-end.has-reserva::after { background: rgba(255,255,255,.5); border-color: rgba(255,255,255,.7); }

  .range-hint {
    padding: 12px 20px;
    background: var(--blue-light);
    border-top: 1px solid #BFDBFE;
    font-size: 12px;
    color: var(--blue);
    font-weight: 500;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  /* ── PANEL TABS ──────────────────────────────── */
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .panel-tab {
    padding: 13px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    margin-bottom: -1px;
  }

  .panel-tab:hover { color: var(--ink); }
  .panel-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

  .panel-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .panel-section:last-child { border-bottom: none; }

  .section-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* ── EQUIPO ITEMS ────────────────────────────── */
  .equipo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all .12s;
    user-select: none;
    background: var(--surface);
  }

  .equipo-item:last-child { margin-bottom: 0; }
  .equipo-item:hover { border-color: #93C5FD; background: var(--blue-light); }

  .equipo-item.selected {
    border-color: var(--blue);
    background: var(--blue-light);
  }

  .equipo-item.unavailable {
    opacity: .38;
    cursor: not-allowed;
    pointer-events: none;
  }

  .eq-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }

  .equipo-item.selected .eq-check {
    background: var(--blue);
    border-color: var(--blue);
  }

  .eq-check svg { display: none; }
  .equipo-item.selected .eq-check svg { display: block; }

  .eq-info { flex: 1; min-width: 0; }
  .eq-nombre { font-size: 13px; font-weight: 500; }
  .eq-sub { font-size: 11px; color: var(--ink-mid); font-family: 'DM Mono', monospace; }

  .tipo-pill {
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .tipo-laptop    { background: #EDE9FE; color: #5B21B6; }
  .tipo-proyector { background: #DBEAFE; color: #1D4ED8; }
  .tipo-camara    { background: #FCE7F3; color: #9D174D; }
  .tipo-audio     { background: #D1FAE5; color: #065F46; }
  .tipo-otro      { background: var(--surface2); color: var(--ink-mid); }

  /* ── RESUMEN ─────────────────────────────────── */
  .resumen-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 4px 0;
  }
  .resumen-label { color: var(--ink-mid); }
  .resumen-value { font-weight: 600; }

  /* ── FORM ────────────────────────────────────── */
  .form-group { margin-bottom: 16px; }
  .form-group:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink);
  }

  label .optional { font-weight: 400; color: var(--ink-light); font-size: 12px; }

  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--surface);
    outline: none;
    transition: border-color .15s;
    resize: vertical;
    min-height: 72px;
  }

  textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(27,110,243,.12); }

  /* ── BUTTON ──────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; height: 40px; padding: 0 18px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; border: none;
    transition: background .15s, transform .1s;
    text-decoration: none; white-space: nowrap;
  }

  .btn:active { transform: translateY(1px); }

  .btn-primary {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 1px 3px rgba(27,110,243,.3);
    width: 100%;
  }

  .btn-primary:hover:not(:disabled) { background: var(--blue-dark); }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--ink-mid);
    border: 1px solid var(--border);
    height: 32px; padding: 0 12px; font-size: 13px;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--ink); }

  .btn-danger-sm {
    background: var(--red-light);
    color: var(--red);
    border: 1px solid #FECACA;
    height: 30px; padding: 0 10px; font-size: 12px;
    font-weight: 600; border-radius: 6px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background .12s;
    flex-shrink: 0;
  }
  .btn-danger-sm:hover { background: #FEE2E2; }

  /* ── MIS RESERVAS ────────────────────────────── */
  .reserva-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .reserva-row:last-child { border-bottom: none; }

  .res-fecha {
    width: 44px; flex-shrink: 0;
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 4px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .res-fecha-day { font-size: 18px; font-weight: 700; line-height: 1; color: var(--ink); }
  .res-fecha-mon { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 1px; color: var(--ink-mid); text-transform: uppercase; }

  .res-content { flex: 1; min-width: 0; }
  .res-title { font-size: 13px; font-weight: 500; }
  .res-sub { font-size: 12px; color: var(--ink-mid); margin-top: 2px; }

  .res-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .res-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    color: var(--ink-mid);
    border: 1px solid var(--border);
  }

  /* ── TABS PANELS ─────────────────────────────── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── GATE ────────────────────────────────────── */
  #gate {
    position: fixed; inset: 0;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; flex-direction: column; gap: 12px;
  }
  .gate-spinner {
    width: 32px; height: 32px;
    border: 2.5px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  .gate-label { font-size: 13px; color: var(--ink-mid); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ───────────────────────────────────── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px; z-index: 500;
  }
  .toast {
    background: var(--ink); color: #fff;
    padding: 12px 18px; border-radius: 10px; font-size: 13px;
    box-shadow: 0 4px 16px rgba(13,15,18,.08);
    animation: slideUp .25s ease;
  }
  .toast.success { background: var(--green); }
  .toast.error   { background: var(--red); }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .empty-small { text-align: center; padding: 24px; color: var(--ink-mid); font-size: 13px; }
</style>
</head>
<body>

<!-- Loading gate -->
<div id="gate">
  <div class="gate-spinner"></div>
  <span class="gate-label">Cargando…</span>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- LAYOUT (header + sidebar + main inyectados por components.js) -->
<header id="pt-header"></header>

<div id="pt-layout">
  <aside id="pt-sidebar"></aside>

  <main id="pt-main">

    <div class="page-header">
      <div class="page-title">Reservar Equipos</div>
      <div class="page-subtitle">Seleccioná las fechas y los equipos que necesitás.</div>
    </div>

    <div class="two-col">

      <!-- CALENDARIO -->
      <div class="card">
        <div class="cal-nav">
          <button class="cal-btn" onclick="prevMonth()">&#8249;</button>
          <span class="cal-month" id="cal-title"></span>
          <button class="cal-btn" onclick="nextMonth()">&#8250;</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="range-hint">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="12" height="11" rx="1.5"/><path d="M1 6h12M5 2V.5M9 2V.5"/></svg>
          <span id="range-hint-text">Seleccioná la fecha de inicio de la reserva.</span>
        </div>
      </div>

      <!-- PANEL DERECHO -->
      <div class="card" style="overflow:hidden;">

        <div class="panel-tabs">
          <div class="panel-tab active" id="ptab-nueva" onclick="switchPanelTab('nueva')">Nueva reserva</div>
          <div class="panel-tab" id="ptab-mis" onclick="switchPanelTab('mis')">Mis reservas</div>
        </div>

        <!-- TAB: NUEVA RESERVA -->
        <div class="tab-panel active" id="ppanel-nueva">

          <div class="panel-section">
            <div class="section-label">Equipos disponibles</div>
            <div id="eq-list">
              <div style="color:var(--ink-light);font-size:13px;text-align:center;padding:16px 0;">Cargando equipos…</div>
            </div>
          </div>

          <div class="panel-section">
            <div class="section-label">Resumen</div>
            <div class="resumen-row"><span class="resumen-label">Fecha inicio</span><span class="resumen-value" id="res-inicio">—</span></div>
            <div class="resumen-row"><span class="resumen-label">Fecha fin</span><span class="resumen-value" id="res-fin">—</span></div>
            <div class="resumen-row"><span class="resumen-label">Duración</span><span class="resumen-value" id="res-duracion">—</span></div>
            <div class="resumen-row"><span class="resumen-label">Equipos</span><span class="resumen-value" id="res-eq-count">0 equipos</span></div>
          </div>

          <div class="panel-section">
            <div class="form-group">
              <label for="f-motivo">Motivo / Proyecto <span class="optional">(opcional)</span></label>
              <textarea id="f-motivo" placeholder="ej. Grabación video Escazú, presentación cliente…"></textarea>
            </div>
            <button class="btn btn-primary" id="btn-reservar" onclick="crearReserva()" disabled>
              Confirmar reserva
            </button>
          </div>

        </div>

        <!-- TAB: MIS RESERVAS -->
        <div class="tab-panel" id="ppanel-mis">
          <div class="panel-section" style="padding:0;">
            <div id="mis-res-list" style="padding:16px 24px;">
              <div class="empty-small">Cargando reservas…</div>
            </div>
          </div>
        </div>

      </div><!-- end panel card -->
    </div><!-- end two-col -->

  </main>

  <footer id="pt-footer"></footer>
</div>

<!-- SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL  = 'https://zsldwaiwcvziqfajcmph.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzbGR3YWl3Y3Z6aXFmYWpjbXBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjQ4NzcsImV4cCI6MjA5MDE0MDg3N30.eFlAAk-fPHI8r8YQPjP8kYnohziRpGu9whGpgfaW-KU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const $ = id => document.getElementById(id);

let currentUser    = null;
let currentProfile = null;
let equipos        = [];
let reservasAll    = [];
let selectedEqs    = new Set();
let rangeStart     = null;
let rangeEnd       = null;
let viewYear       = new Date().getFullYear();
let viewMonth      = new Date().getMonth();

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS  = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];

// ── BOOT ───────────────────────────────────────────────────
async function boot() {
  const result = await initComponents({ active: 'equipos' });
  if (!result) return;

  const { profile } = result;
  currentUser    = (await sb.auth.getSession()).data.session.user;
  currentProfile = profile;

  $('gate').style.display = 'none';

  await Promise.all([loadEquipos(), loadTodasReservas()]);
  renderCalendar();
}

// ── LOAD DATA ──────────────────────────────────────────────
async function loadEquipos() {
  const { data } = await sb.from('equipos').select('*').neq('estado','mantenimiento').order('tipo').order('nombre');
  equipos = data || [];
  renderEqList();
}

async function loadTodasReservas() {
  const today = toISO(new Date());
  const { data } = await sb.from('reservas').select('*, reserva_equipos(equipo_id)').gte('fecha_fin', today).eq('estado','activa');
  reservasAll = data || [];
}

async function loadMisReservas() {
  const today = toISO(new Date());
  const { data } = await sb.from('reservas')
    .select('*, reserva_equipos(equipo_id, equipos(nombre, tipo))')
    .eq('user_auth_id', currentUser.id)
    .gte('fecha_fin', today)
    .eq('estado','activa')
    .order('fecha_inicio');
  return data || [];
}

// ── EQUIPO LIST ────────────────────────────────────────────
function renderEqList() {
  const container = $('eq-list');
  if (!equipos.length) {
    container.innerHTML = '<div class="empty-small">No hay equipos disponibles.</div>';
    return;
  }

  const ini = rangeStart ? toISO(rangeStart) : null;
  const fin = rangeEnd   ? toISO(rangeEnd)   : ini;

  container.innerHTML = equipos.map(e => {
    const ocupado = ini ? isOcupado(e.id, ini, fin) : false;
    const sel = selectedEqs.has(e.id);
    return `
    <div class="equipo-item ${sel ? 'selected' : ''} ${ocupado ? 'unavailable' : ''}"
         onclick="toggleEq('${e.id}')">
      <div class="eq-check">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="white" stroke-width="2.5"><path d="M2 5.5l2.5 2.5 4.5-4.5"/></svg>
      </div>
      <div class="eq-info">
        <div class="eq-nombre">${e.nombre}</div>
        <div class="eq-sub">${e.marca} · ${e.modelo}${ocupado ? ' · <span style="color:var(--red)">No disponible</span>' : ''}</div>
      </div>
      <span class="tipo-pill tipo-${e.tipo || 'otro'}">${tipoLabel(e.tipo)}</span>
    </div>`;
  }).join('');
}

function isOcupado(eqId, ini, fin) {
  return reservasAll.some(r => {
    const tiene = r.reserva_equipos?.some(re => re.equipo_id === eqId);
    if (!tiene) return false;
    return r.fecha_inicio <= fin && r.fecha_fin >= ini;
  });
}

function toggleEq(id) {
  if (selectedEqs.has(id)) selectedEqs.delete(id); else selectedEqs.add(id);
  updateResumen();
  renderEqList();
}

function tipoLabel(t) {
  return { laptop:'Laptop', proyector:'Proyector', camara:'Cámara', audio:'Audio', otro:'Otro' }[t] || t || 'Otro';
}

// ── CALENDAR ───────────────────────────────────────────────
function renderCalendar() {
  $('cal-title').textContent = `${MESES[viewMonth]} ${viewYear}`;

  const today    = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInM  = new Date(viewYear, viewMonth + 1, 0).getDate();
  const resDates = getReservedDates();

  let html = DIAS.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day cal-empty"></div>';

  for (let d = 1; d <= daysInM; d++) {
    const date = new Date(viewYear, viewMonth, d); date.setHours(0,0,0,0);
    const isPast   = date < today;
    const isToday  = date.getTime() === today.getTime();
    const iso      = toISO(date);
    const hasRes   = resDates.has(iso);

    let cls = 'cal-day';
    if (isPast) {
      cls += ' cal-past';
    } else if (rangeStart && rangeEnd) {
      const ds = new Date(rangeStart); ds.setHours(0,0,0,0);
      const de = new Date(rangeEnd);   de.setHours(0,0,0,0);
      if      (date.getTime() === ds.getTime()) cls += ' cal-range-start';
      else if (date.getTime() === de.getTime()) cls += ' cal-range-end';
      else if (date > ds && date < de)          cls += ' cal-in-range';
    } else if (rangeStart && !rangeEnd) {
      const ds = new Date(rangeStart); ds.setHours(0,0,0,0);
      if (date.getTime() === ds.getTime()) cls += ' cal-selected';
    }

    if (isToday && !cls.includes('range') && !cls.includes('selected')) cls += ' cal-today';
    if (hasRes)  cls += ' has-reserva';

    html += `<div class="${cls}" onclick="${isPast ? '' : `selectDay(${viewYear},${viewMonth},${d})`}">${d}</div>`;
  }

  $('cal-grid').innerHTML = html;
  updateRangeHint();
  renderEqList();
}

function getReservedDates() {
  const set = new Set();
  reservasAll.forEach(r => {
    let d   = new Date(r.fecha_inicio + 'T00:00:00');
    const e = new Date(r.fecha_fin    + 'T00:00:00');
    while (d <= e) { set.add(toISO(d)); d.setDate(d.getDate() + 1); }
  });
  return set;
}

function selectDay(y, m, d) {
  const date = new Date(y, m, d); date.setHours(0,0,0,0);

  if (!rangeStart || (rangeStart && rangeEnd)) {
    rangeStart = date; rangeEnd = null;
  } else {
    if (date < rangeStart)                            { rangeEnd = rangeStart; rangeStart = date; }
    else if (date.getTime() === rangeStart.getTime()) { rangeStart = null; rangeEnd = null; }
    else                                               rangeEnd = date;
  }

  selectedEqs.clear();
  updateResumen();
  renderCalendar();
}

function updateRangeHint() {
  const el = $('range-hint-text');
  if (!rangeStart)         { el.textContent = 'Seleccioná la fecha de inicio de la reserva.'; return; }
  if (!rangeEnd)           { el.textContent = `Inicio: ${fmtDate(rangeStart)} — Ahora seleccioná la fecha de fin.`; return; }
  const dias = diffDays(rangeStart, rangeEnd) + 1;
  el.textContent = `${fmtDate(rangeStart)} → ${fmtDate(rangeEnd)} · ${dias} día${dias > 1 ? 's' : ''}.`;
}

function updateResumen() {
  $('res-inicio').textContent  = rangeStart ? fmtDate(rangeStart) : '—';
  $('res-fin').textContent     = rangeEnd   ? fmtDate(rangeEnd)   : (rangeStart ? fmtDate(rangeStart) : '—');
  const dias = rangeStart ? (rangeEnd ? diffDays(rangeStart, rangeEnd) + 1 : 1) : 0;
  $('res-duracion').textContent = dias > 0 ? `${dias} día${dias > 1 ? 's' : ''}` : '—';
  const n = selectedEqs.size;
  $('res-eq-count').textContent = `${n} equipo${n !== 1 ? 's' : ''}`;
  $('btn-reservar').disabled = !(rangeStart && n > 0);
}

function prevMonth() {
  if (viewMonth === 0) { viewMonth = 11; viewYear--; } else viewMonth--;
  renderCalendar();
}
function nextMonth() {
  if (viewMonth === 11) { viewMonth = 0; viewYear++; } else viewMonth++;
  renderCalendar();
}

// ── CREAR RESERVA ──────────────────────────────────────────
async function crearReserva() {
  if (!rangeStart || selectedEqs.size === 0) return;

  const ini    = toISO(rangeStart);
  const fin    = rangeEnd ? toISO(rangeEnd) : ini;
  const motivo = $('f-motivo').value.trim();
  const btn    = $('btn-reservar');

  btn.disabled = true;
  btn.textContent = 'Guardando…';

  try {
    const { data: reserva, error: err1 } = await sb.from('reservas').insert({
      user_auth_id: currentUser.id,
      fecha_inicio: ini,
      fecha_fin:    fin,
      motivo:       motivo || null,
      estado:       'activa'
    }).select().single();

    if (err1) throw err1;

    const items = Array.from(selectedEqs).map(id => ({ reserva_id: reserva.id, equipo_id: id }));
    const { error: err2 } = await sb.from('reserva_equipos').insert(items);
    if (err2) { await sb.from('reservas').delete().eq('id', reserva.id); throw err2; }

    toast('✓ Reserva confirmada', 'success');

    rangeStart = null; rangeEnd = null;
    selectedEqs.clear();
    $('f-motivo').value = '';
    updateResumen();

    await Promise.all([loadEquipos(), loadTodasReservas()]);
    renderCalendar();

  } catch (err) {
    toast('✗ Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirmar reserva';
  }
}

// ── MIS RESERVAS ───────────────────────────────────────────
async function renderMisReservas() {
  const container = $('mis-res-list');
  const data = await loadMisReservas();

  if (!data.length) {
    container.innerHTML = '<div class="empty-small">No tenés reservas activas.</div>';
    return;
  }

  container.innerHTML = data.map(r => {
    const d   = new Date(r.fecha_inicio + 'T00:00:00');
    const day = d.getDate();
    const mon = MESES[d.getMonth()].substring(0,3).toUpperCase();
    const eqs = r.reserva_equipos || [];
    const finStr = r.fecha_fin !== r.fecha_inicio ? ` → ${fmtDateShort(new Date(r.fecha_fin + 'T00:00:00'))}` : '';
    return `
    <div class="reserva-row">
      <div class="res-fecha">
        <div class="res-fecha-day">${day}</div>
        <div class="res-fecha-mon">${mon}</div>
      </div>
      <div class="res-content">
        <div class="res-title">${r.motivo || 'Sin descripción'}${finStr}</div>
        <div class="res-sub">${eqs.length} equipo${eqs.length !== 1 ? 's' : ''}</div>
        <div class="res-tags">
          ${eqs.map(e => `<span class="res-tag">${e.equipos?.nombre || '—'}</span>`).join('')}
        </div>
      </div>
      <button class="btn-danger-sm" onclick="cancelarReserva('${r.id}', ${JSON.stringify(eqs.map(e => e.equipo_id))})">Cancelar</button>
    </div>`;
  }).join('');
}

async function cancelarReserva(reservaId, eqIds) {
  if (!confirm('¿Cancelar esta reserva?')) return;
  await sb.from('reservas').update({ estado: 'cancelada' }).eq('id', reservaId);
  toast('Reserva cancelada');
  await Promise.all([loadEquipos(), loadTodasReservas()]);
  renderMisReservas();
  renderCalendar();
}

// ── PANEL TABS ─────────────────────────────────────────────
function switchPanelTab(tab) {
  ['nueva','mis'].forEach(t => {
    $('ptab-' + t).classList.toggle('active', t === tab);
    $('ppanel-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'mis') renderMisReservas();
}

// ── UTILS ──────────────────────────────────────────────────
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(d) {
  return `${d.getDate()} ${MESES[d.getMonth()].substring(0,3)} ${d.getFullYear()}`;
}

function fmtDateShort(d) {
  return `${d.getDate()} ${MESES[d.getMonth()].substring(0,3)}`;
}

function diffDays(a, b) { return Math.round((b - a) / 86400000); }

function toast(msg, type = 'default') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

boot();
</script>
</body>
</html>
