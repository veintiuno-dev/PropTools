<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:    #1B6EF3;
  --blue-dk: #0A4FC4;
  --ink:     #0D0F12;
  --ink-mid: #5A6070;
  --surface: #ffffff;
  --surface2:#F4F5F7;
  --border:  #E2E5EA;
  --success: #0FA870;
  --warn:    #F59E0B;
  --error:   #EF4444;
  --radius:  10px;
  --text: var(--ink);
  --muted: var(--ink-mid);
  --bg: var(--surface2);
}
body { font-family:'DM Sans',-apple-system,sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; font-size:14px; }

/* LOGIN */
.login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:24px; }
.login-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:400px; box-shadow:0 4px 24px rgba(0,0,0,.06); }
.login-logo { display:flex; align-items:center; gap:8px; margin-bottom:28px; font-size:16px; font-weight:400; color:var(--ink); letter-spacing:-0.2px; }
.login-logo strong { font-weight:700; }
.login-box h2 { font-size:22px; font-weight:700; margin-bottom:6px; }
.login-box p { font-size:13px; color:var(--muted); margin-bottom:28px; line-height:1.5; }
.form-field { margin-bottom:14px; }
.form-field label { font-size:11px; font-weight:500; color:var(--ink-mid); display:block; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.8px; font-family:'DM Mono',monospace; }
.form-field input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--ink); font-family:inherit; font-size:14px; outline:none; transition:border-color .15s; }
.form-field input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(27,110,243,.1); }
.btn-login { width:100%; background:var(--blue); color:#fff; border:none; border-radius:8px; padding:12px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; margin-top:4px; transition:background .15s; }
.btn-login:hover { background:var(--blue-dk); }
.btn-login:disabled { background:#aaa; cursor:not-allowed; }
.login-error { font-size:12px; color:var(--error); margin-top:10px; text-align:center; display:none; }
.login-footer { margin-top:20px; text-align:center; font-size:12px; color:var(--ink-mid); }

/* APP */
.app-screen { display:none; min-height:100vh; flex-direction:column; }
.app-screen.visible { display:flex; }

/* HEADER */
header { height:88px; padding:0 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; background:var(--surface); flex-shrink:0; }
.header-brand { display:flex; align-items:center; gap:10px; }
.pt-wordmark { font-family:'DM Sans',sans-serif; font-size:17px; font-weight:400; color:var(--ink); letter-spacing:-0.3px; white-space:nowrap; display:flex; align-items:center; }
.pt-wordmark .pt-bold { font-weight:700; }
.pt-sep { color:var(--border); font-weight:300; margin:0 8px; font-size:20px; line-height:1; }
.pt-app { font-size:17px; font-weight:500; color:var(--ink-mid); }
.header-tenant-badge { display:none; align-items:center; }
.header-tenant-badge img { height:50px; max-width:160px; object-fit:contain; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
.db-status { font-size:11px; padding:4px 10px; border-radius:20px; display:inline-flex; align-items:center; gap:5px; border:1px solid var(--border); background:var(--surface2); font-family:'DM Mono',monospace; }
.db-dot { width:7px; height:7px; border-radius:50%; background:var(--warn); }
.db-dot.ok { background:var(--success); }
.nav-divider { width:1px; height:22px; background:var(--border); margin:0 4px; }
.nav-item { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; padding:6px 11px; border-radius:7px; border:1px solid transparent; background:transparent; color:var(--ink-mid); cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; text-decoration:none; }
.nav-item:hover { background:var(--surface2); color:var(--ink); border-color:var(--border); }
.nav-item.active { background:var(--surface2); color:var(--ink); border-color:var(--border); font-weight:600; }
.btn-logout { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; padding:6px 12px; border-radius:7px; border:1px solid var(--border); background:var(--surface2); color:var(--ink-mid); cursor:pointer; transition:all .15s; }
.btn-logout:hover { border-color:var(--error); color:var(--error); background:#fff5f5; }

/* MAIN CONTENT */
main { flex:1; overflow-y:auto; padding:32px 28px 80px; max-width:800px; margin:0 auto; width:100%; }
.page-header { margin-bottom:28px; }
.page-header h1 { font-size:22px; font-weight:700; color:var(--ink); margin-bottom:4px; }
.page-header p { font-size:13px; color:var(--muted); }

/* PROFILE CARD */
.profile-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:20px; }
.profile-card-header { padding:28px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:24px; }
.profile-avatar { width:130px; height:130px; border-radius:50%; background:var(--surface2); border:2px solid var(--border); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.profile-avatar img { width:100%; height:100%; object-fit:cover; }
.profile-avatar-placeholder { color:var(--ink-mid); }
.profile-avatar-info { flex:1; }
.profile-avatar-info h2 { font-size:28px; font-weight:700; color:var(--ink); margin-bottom:6px; }
.profile-avatar-info p { font-size:17px; color:var(--muted); }
.profile-avatar-actions { display:flex; gap:8px; }
.btn-upload-photo { font-family:inherit; font-size:12px; font-weight:600; padding:7px 14px; border-radius:7px; border:1px solid var(--border); background:var(--surface2); color:var(--ink); cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; }
.btn-upload-photo:hover { border-color:var(--blue); color:var(--blue); }
input[type="file"] { display:none; }

/* FORM SECTIONS */
.profile-section { padding:24px; }
.profile-section + .profile-section { border-top:1px solid var(--border); }
.section-title { font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-mid); margin-bottom:16px; font-family:'DM Mono',monospace; }
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.field-grid.single { grid-template-columns:1fr; }
.field-item { display:flex; flex-direction:column; gap:4px; }
.field-item label { font-size:11px; font-weight:500; color:var(--ink-mid); text-transform:uppercase; letter-spacing:0.8px; font-family:'DM Mono',monospace; }
.field-item input { background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:9px 11px; color:var(--ink); font-family:inherit; font-size:13px; outline:none; transition:all .15s; width:100%; }
.field-item input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(27,110,243,.1); }
.field-item input::placeholder { color:var(--ink-mid); opacity:.4; }
.field-with-icon { position:relative; display:flex; align-items:center; }
.field-with-icon .field-icon { position:absolute; left:10px; display:flex; align-items:center; pointer-events:none; z-index:1; }
.field-with-icon input { padding-left:32px; }

/* SAVE BAR */
.save-bar { display:flex; align-items:center; justify-content:space-between; }
.save-status { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
.save-status.saved { color:var(--success); }
.btn-save-profile { font-family:inherit; font-size:13px; font-weight:600; padding:9px 22px; border-radius:8px; border:none; background:var(--blue); color:#fff; cursor:pointer; transition:background .15s; }
.btn-save-profile:hover { background:var(--blue-dk); }
.btn-save-profile:disabled { background:#aaa; cursor:not-allowed; }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#000; color:#fff; padding:10px 22px; border-radius:100px; font-weight:700; font-size:13px; transition:transform .3s cubic-bezier(.34,1.56,.64,1); pointer-events:none; z-index:1100; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* Splash screen - oculta flash de login mientras se verifica sesión */
#splash { position:fixed; inset:0; background:var(--surface2); display:flex; align-items:center; justify-content:center; z-index:9999; }
#splash.hidden { display:none; }
.splash-spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    /* ── LOGO PROPTOOLS v2 ── */

  </style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(
  'https://zsldwaiwcvziqfajcmph.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzbGR3YWl3Y3Z6aXFmYWpjbXBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjQ4NzcsImV4cCI6MjA5MDE0MDg3N30.eFlAAk-fPHI8r8YQPjP8kYnohziRpGu9whGpgfaW-KU'
);
window.sb = sb; // exponer para components.js

// Cargar components.js después de que sb esté disponible
await new Promise((resolve, reject) => {
  const s = document.createElement('script');
  s.src = '../components.js';
  s.onload = resolve;
  s.onerror = reject;
  document.head.appendChild(s);
});

const CLOUD = 'dlgrhr6lh', PRESET = 'firmas';
let currentUser = null, currentProfile = null, currentTenant = null;
let photoDataUrl = null;

const el  = id => document.getElementById(id);
const v   = id => { const e = el(id); return e ? e.value.trim() : ''; };
const setV= (id,val) => { const e = el(id); if(e) e.value = val || ''; };

function toast(msg) {
  const t = el('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Auth ── */
async function doLogin() {
  const email = v('login-email'), password = el('login-password').value;
  const errEl = el('login-error'), btn = el('btn-login');
  errEl.style.display = 'none';
  if(!email||!password){ errEl.textContent='Completa todos los campos.'; errEl.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Ingresando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent='Correo o contraseña incorrectos.'; errEl.style.display='block'; btn.disabled=false; btn.textContent='Ingresar'; return; }
  currentUser = data.session.user;
  window.sb = sb; // asegurar que components.js lo pueda ver
  if (typeof initComponents !== 'undefined') {
    await initComponents({ active: 'perfil' });
  }
  await loadContext();
}

async function doLogout() {
  await sb.auth.signOut();
  el('login-screen').style.display = 'flex';
  el('app-screen').classList.remove('visible');
}

async function loadContext() {
  try {
    const { data: p, error } = await sb.from('users').select('*,tenants(*)').eq('auth_id', currentUser.id).single();
    if(error || !p) throw new Error('Usuario no encontrado.');
    currentProfile = p; currentTenant = p.tenants;

    /* Llenar campos */
    setV('f-name',      p.name);
    setV('f-role',      p.job_title);
    setV('f-email',     p.email);
    setV('f-phone',     p.phone);
    setV('f-whatsapp',  p.whatsapp);
    setV('f-instagram', p.instagram);
    setV('f-facebook',  p.facebook);
    setV('f-linkedin',  p.linkedin);
    setV('f-tiktok',    p.tiktok);

    /* Display name/role en card header */
    if(p.name)  el('display-name').textContent = p.name;
    if(p.job_title) el('display-role').textContent = p.job_title;

    /* Foto */
    if(p.photo_url) {
      photoDataUrl = p.photo_url;
      el('avatar-wrap').innerHTML = `<img src="${p.photo_url}" alt="">`;
    }

    if(el('login-screen')) el('login-screen').style.display = 'none';
    el('app-screen').classList.add('visible');
    el('splash').classList.add('hidden');
    el('btn-login').disabled = false; el('btn-login').textContent = 'Ingresar';
  } catch(e) {
    el('login-error').textContent = e.message; el('login-error').style.display = 'block';
    el('btn-login').disabled = false; el('btn-login').textContent = 'Ingresar';
    el('splash').classList.add('hidden');
    await sb.auth.signOut();
  }
}

/* ── Live preview ── */
function updateDisplayName() {
  const n = v('f-name'); if(n) el('display-name').textContent = n;
  const r = v('f-role'); if(r) el('display-role').textContent = r;
}

/* ── Subir foto ── */
function uploadPhoto(file) {
  if(!file) return;
  const btn = el('btn-save');
  const slug = (v('f-name')||'agente').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const fd = new FormData();
  fd.append('file', file); fd.append('upload_preset', PRESET);
  fd.append('public_id', `agentes/${slug}-${Date.now()}`);
  toast('Subiendo foto...');
  fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, { method:'POST', body:fd })
    .then(r => r.json()).then(async d => {
      if(d.secure_url) {
        photoDataUrl = d.secure_url;
        el('avatar-wrap').innerHTML = `<img src="${d.secure_url}" alt="">`;
        /* Guardar inmediatamente en perfil */
        if(currentProfile) {
          await sb.from('users').update({ photo_url: d.secure_url }).eq('id', currentProfile.id);
          toast('Foto actualizada ✓');
        }
      } else throw new Error(d.error?.message || 'Error');
    }).catch(e => toast('Error subiendo foto: ' + e.message));
}

/* ── Guardar perfil ── */
async function saveProfile() {
  if(!currentProfile) return;
  const btn = el('btn-save'); btn.disabled = true; btn.textContent = 'Guardando...';
  const status = el('save-status');
  try {
    const updates = {
      name:      v('f-name'),
      job_title: v('f-role'),
      email:     v('f-email'),
      phone:     v('f-phone'),
      whatsapp:  v('f-whatsapp'),
      instagram: v('f-instagram'),
      facebook:  v('f-facebook'),
      linkedin:  v('f-linkedin'),
      tiktok:    v('f-tiktok'),
      photo_url: photoDataUrl || null,
    };
    const { error } = await sb.from('users').update(updates).eq('id', currentProfile.id);
    if(error) throw error;
    /* Actualizar display */
    if(updates.name) el('display-name').textContent = updates.name;
    if(updates.role) el('display-role').textContent = updates.role;
    status.textContent = '✓ Guardado — disponible en todas las herramientas';
    status.className = 'save-status saved';
    setTimeout(() => { status.textContent = 'Los cambios se guardan en todas las herramientas'; status.className = 'save-status'; }, 3000);
    toast('Perfil guardado ✓');
  } catch(e) {
    toast('Error: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Guardar cambios';
  }
}

/* ── Event listeners ── */
el('btn-login').addEventListener('click', doLogin);
el('login-password').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
// logout manejado por components.js → window.__ptLogout
el('btn-save').addEventListener('click', saveProfile);
el('photo-upload').addEventListener('change', e => uploadPhoto(e.target.files[0]));
['f-name', 'f-role'].forEach(id => {
  el(id)?.addEventListener('input', updateDisplayName);
});

/* ── Init ── */
{
  // Intentar restaurar sesión (puede tomar un momento en el primer render)
  let session = (await sb.auth.getSession()).data.session;
  if (!session) {
    session = await new Promise(resolve => {
      const timeout = setTimeout(() => resolve(null), 2000);
      const { data: { subscription } } = sb.auth.onAuthStateChange((_event, s) => {
        if (s) { clearTimeout(timeout); subscription.unsubscribe(); resolve(s); }
      });
    });
  }
  if (session) {
    currentUser = session.user;
    await initComponents({ active: 'perfil' });
    await loadContext();
  } else {
    el('splash').classList.add('hidden');
    el('login-screen').style.display = 'flex';
  }
}
</script>
</body>
</html>
