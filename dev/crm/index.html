<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — PropTools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --blue:    #1B6EF3;
  --ink:     #0D0F12;
  --ink-mid: #5A6070;
  --surface: #fff;
  --surface2:#F4F5F7;
  --border:  #E2E5EA;
  --muted:   #9CA3AF;
  --red:     #DC2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--surface2); color: var(--ink); }

#pt-header { height: 88px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 100; }
.page-body { height: calc(100vh - 137px); display: flex; flex-direction: column; overflow: hidden; }
.page-content { flex: 1; overflow-y: auto; padding: 24px; }

.crm-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 24px; }
.crm-tab { padding: 14px 18px; font-size: 14px; font-weight: 700; color: var(--ink-mid); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.crm-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
.crm-tab:hover:not(.active) { color: var(--ink); }

.toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 380px; }
.search-wrap input { width: 100%; height: 38px; padding: 0 12px 0 36px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--surface); color: var(--ink); font-family: 'DM Sans', sans-serif; }
.search-wrap input:focus { outline: none; border-color: var(--blue); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
select.filter { height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--surface); color: var(--ink); font-family: 'DM Sans', sans-serif; cursor: pointer; }
select.filter:focus { outline: none; border-color: var(--blue); }
.btn-primary { height: 38px; padding: 0 18px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.btn-primary:hover { background: #1558d4; }
.btn-ghost { height: 38px; padding: 0 14px; background: var(--surface); color: var(--ink); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.btn-ghost:hover { background: var(--surface2); }
.count-chip { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); }

.contacts-grid { display: flex; flex-direction: column; gap: 8px; }
.contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
.contact-card:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(27,110,243,.08); }
.avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.contact-main { flex: 1; min-width: 0; }
.contact-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.contact-meta { font-size: 12px; color: var(--ink-mid); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
.type-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.contact-actions { display: flex; gap: 6px; opacity: 0; transition: opacity .15s; }
.contact-card:hover .contact-actions { opacity: 1; }
.action-btn { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--ink-mid); }
.action-btn:hover { background: var(--surface2); }
.action-btn.danger:hover { background: #FEF2F2; color: var(--red); border-color: #FECACA; }

.state-empty, .state-loading { text-align: center; padding: 64px 24px; color: var(--muted); }
.state-empty h3 { font-size: 16px; font-weight: 700; color: var(--ink-mid); margin-bottom: 8px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay { position: fixed; inset: 0; background: rgba(13,15,18,.45); z-index: 200; display: flex; align-items: flex-start; justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-panel { width: 560px; max-width: 100vw; height: 100vh; background: var(--surface); display: flex; flex-direction: column; box-shadow: -4px 0 24px rgba(0,0,0,.12); transform: translateX(40px); transition: transform .2s; }
.modal-overlay.open .modal-panel { transform: translateX(0); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border: none; background: none; cursor: pointer; font-size: 18px; color: var(--ink-mid); border-radius: 6px; }
.modal-close:hover { background: var(--surface2); }
.modal-body { flex: 1; overflow-y: auto; padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; background: var(--surface); }

.form-section { margin-bottom: 24px; }
.form-section-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.field-grid { display: grid; gap: 12px; }
.field-grid.cols2 { grid-template-columns: 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 700; color: var(--ink-mid); }
.field input, .field select, .field textarea { height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--ink); width: 100%; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--blue); }
.field textarea { height: 80px; padding: 10px 12px; resize: none; }
.field .hint { font-size: 11px; color: var(--muted); }

.cedula-row { display: flex; gap: 8px; }
.cedula-row input { flex: 1; }
.lookup-btn { height: 38px; padding: 0 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif; background: var(--surface2); color: var(--ink); cursor: pointer; white-space: nowrap; }
.lookup-btn:hover { background: var(--border); }
.lookup-btn:disabled { opacity: .5; pointer-events: none; }
.lookup-result { display: none; font-size: 12px; padding: 6px 10px; border-radius: 6px; margin-top: 4px; }
.lookup-result.ok  { display: block; background: #F0FDF4; border: 1px solid #BBF7D0; color: #15803D; }
.lookup-result.err { display: block; background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; }

.social-row { display: flex; align-items: center; gap: 8px; }
.social-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.social-row input { flex: 1; }
.social-search { height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 700; font-family: 'DM Sans', sans-serif; background: var(--surface2); color: var(--ink-mid); cursor: pointer; white-space: nowrap; }
.social-search:hover { color: var(--ink); background: var(--border); }

.company-suggestions { display: none; position: relative; }
.company-list { position: absolute; top: 2px; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; z-index: 50; max-height: 160px; overflow-y: auto; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
.company-item { padding: 8px 12px; cursor: pointer; font-size: 14px; border-bottom: 1px solid var(--border); }
.company-item:last-child { border-bottom: none; }
.company-item:hover { background: var(--surface2); }
.company-item small { font-size: 11px; color: var(--muted); margin-left: 6px; }

.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; z-index: 999; transform: translateY(60px); opacity: 0; transition: transform .25s, opacity .25s; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: #15803D; color: #fff; }
.toast.error   { background: var(--red); color: #fff; }
</style>
</head>
<body>

<header id="pt-header"></header>

<div class="crm-tabs">
  <button class="crm-tab active" id="tab-contacts">Clientes</button>
  <button class="crm-tab" id="tab-deals">Negocios</button>
  <button class="crm-tab" id="tab-properties">Propiedades</button>
</div>

<div class="page-body">
  <div class="page-content">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Buscar por nombre, cédula, email…">
      </div>
      <select class="filter" id="type-filter">
        <option value="">Todos los tipos</option>
      </select>
      <select class="filter" id="source-filter">
        <option value="">Todas las fuentes</option>
      </select>
      <span class="count-chip" id="count-chip"></span>
      <button class="btn-primary" id="btn-new">+ Nuevo cliente</button>
    </div>
    <div id="contacts-list">
      <div class="state-loading"><div class="spinner"></div><p>Cargando clientes…</p></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-panel">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nuevo cliente</span>
      <button class="modal-close" id="btn-close">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-section">
        <div class="form-section-label">Identificación</div>
        <div class="field-grid cols2">
          <div class="field">
            <label>Cédula / DIMEX / Pasaporte</label>
            <div class="cedula-row">
              <input type="text" id="f-cedula" placeholder="1-2345-6789" maxlength="15">
              <button class="lookup-btn" id="btn-lookup-cedula">Consultar →</button>
            </div>
            <div class="lookup-result" id="result-cedula"></div>
            <span class="hint">Autocompleta nombre desde Hacienda CR</span>
          </div>
          <div class="field">
            <label>Tipo de ID</label>
            <select id="f-cedula-tipo">
              <option value="fisica">Cédula física</option>
              <option value="dimex">DIMEX</option>
              <option value="pasaporte">Pasaporte</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-label">Datos personales</div>
        <div class="field-grid cols2">
          <div class="field"><label>Nombre *</label><input type="text" id="f-name" placeholder="María"></div>
          <div class="field"><label>Apellidos</label><input type="text" id="f-last-name" placeholder="Rodríguez Mora"></div>
          <div class="field"><label>Fecha de nacimiento</label><input type="date" id="f-birth-date"></div>
          <div class="field"><label>Tipo de contacto</label><select id="f-type"><option value="">Sin tipo</option></select></div>
          <div class="field"><label>Fuente / Canal</label><select id="f-source"><option value="">Sin fuente</option></select></div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-label">Contacto</div>
        <div class="field-grid cols2">
          <div class="field"><label>Email</label><input type="email" id="f-email" placeholder="correo@ejemplo.com"></div>
          <div class="field"><label>Teléfono / WhatsApp</label><input type="tel" id="f-phone" placeholder="8888-1234"></div>
          <div class="field"><label>Teléfono alternativo</label><input type="tel" id="f-phone-alt" placeholder="2222-0000"></div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-label">Empresa</div>
        <div class="field-grid cols2">
          <div class="field">
            <label>Nombre de empresa</label>
            <input type="text" id="f-company-name" placeholder="Inversiones XYZ S.A." autocomplete="off">
            <div class="company-suggestions" id="co-suggestions">
              <div class="company-list" id="co-list"></div>
            </div>
          </div>
          <div class="field">
            <label>Cédula jurídica</label>
            <div class="cedula-row">
              <input type="text" id="f-company-cedula" placeholder="3-101-123456">
              <button class="lookup-btn" id="btn-lookup-empresa">Consultar →</button>
            </div>
            <div class="lookup-result" id="result-empresa"></div>
          </div>
        </div>
        <input type="hidden" id="f-company-id">
      </div>

      <div class="form-section">
        <div class="form-section-label">Redes sociales</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="social-row"><span class="social-icon">📸</span><input type="text" id="f-instagram" placeholder="@usuario o URL"><button class="social-search" id="btn-ig">Buscar ↗</button></div>
          <div class="social-row"><span class="social-icon">💼</span><input type="text" id="f-linkedin" placeholder="URL de LinkedIn"><button class="social-search" id="btn-li">Buscar ↗</button></div>
          <div class="social-row"><span class="social-icon">📘</span><input type="text" id="f-facebook" placeholder="@usuario o URL"><button class="social-search" id="btn-fb">Buscar ↗</button></div>
          <div class="social-row"><span class="social-icon">🎵</span><input type="text" id="f-tiktok" placeholder="@usuario"><button class="social-search" id="btn-tt">Buscar ↗</button></div>
        </div>
        <p style="font-size:11px;color:var(--muted);margin-top:8px">Abre Google con el nombre del contacto + la red para localizar el perfil correcto.</p>
      </div>

      <div class="form-section">
        <div class="form-section-label">Comentarios</div>
        <div class="field"><textarea id="f-notes" placeholder="Notas internas, preferencias, contexto…"></textarea></div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="btn-cancel">Cancelar</button>
      <button class="btn-primary" id="btn-save">Guardar cliente</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
const SUPABASE_URL  = 'https://ttfkznarmavpfmvdwale.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0Zmt6bmFybWF2cGZtdmR3YWxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTQ0OTYsImV4cCI6MjA5MTY3MDQ5Nn0.Xw_JJBb1v6lXX-ImiRqf2dp0-EJ1MUvJwKNPViyVT0c';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── AUTH ──────────────────────────────────────────────────
const { data: { session } } = await sb.auth.getSession();
if (!session) { window.location.href = '/dev/perfil/'; }
const currentUser = session.user;

const { data: profile } = await sb.from('users').select('*, tenants(*)')
  .eq('auth_id', currentUser.id).single();
if (!profile) { window.location.href = '/dev/perfil/'; }

window.sb = sb;
const _cs = document.createElement('script');
_cs.type = 'module'; _cs.src = '/dev/components.js';
document.head.appendChild(_cs);
_cs.onload = () => { if (window.initComponents) initComponents({ active: 'crm' }); };

// ── STATE ──────────────────────────────────────────────────
let contactTypes   = [];
let contactSources = [];
let allCompanies   = [];
let editingId      = null;
let searchTimer    = null;

// ── UTIL ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function showToast(msg, type = 'success') {
  const t = $('toast'); t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

function showLookup(id, type, msg) {
  const el = $(id); el.className = 'lookup-result ' + type; el.textContent = msg;
}

function fmtPhone(el) {
  let v = el.value.replace(/\D/g,'').slice(0,8);
  if (v.length > 4) v = v.slice(0,4)+'-'+v.slice(4);
  el.value = v;
}

function fmtCedula(el) {
  const tipo = $('f-cedula-tipo').value;
  if (tipo === 'fisica') {
    let v = el.value.replace(/\D/g,'').slice(0,9);
    if (v.length > 5)      v = v[0]+'-'+v.slice(1,5)+'-'+v.slice(5);
    else if (v.length > 1) v = v[0]+'-'+v.slice(1);
    el.value = v;
  } else if (tipo === 'dimex') {
    // XXX-XXXXXXXXX (3 + hasta 9 dígitos = 12 total)
    let v = el.value.replace(/\D/g,'').slice(0,12);
    if (v.length > 3) v = v.slice(0,3)+'-'+v.slice(3);
    el.value = v;
  }
  // pasaporte: sin formateo, acepta alfanumérico libre
}

function validateCedula() {
  const tipo = $('f-cedula-tipo').value;
  const val  = $('f-cedula').value.trim();
  if (!val) return { ok: true };
  if (tipo === 'fisica') {
    if (!/^\d-\d{4}-\d{4}$/.test(val))
      return { ok: false, msg: 'Cédula física inválida — debe ser X-XXXX-XXXX (9 dígitos)' };
  } else if (tipo === 'dimex') {
    if (!/^\d{3}-\d{6,9}$/.test(val))
      return { ok: false, msg: 'DIMEX inválido — debe ser XXX-XXXXXX (mínimo 9, máximo 12 dígitos)' };
  }
  // pasaporte: cualquier valor no vacío es válido
  return { ok: true };
}

// ── CATÁLOGOS ──────────────────────────────────────────────
async function loadTypes() {
  const { data } = await sb.from('contact_types').select('*')
    .eq('tenant_id', profile.tenant_id).order('position');
  contactTypes = data || [];
  const base = '<option value="">Sin tipo</option>';
  $('f-type').innerHTML = base + contactTypes.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');
  $('type-filter').innerHTML = '<option value="">Todos los tipos</option>' +
    contactTypes.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');
}

async function loadSources() {
  const { data } = await sb.from('contact_sources').select('*')
    .eq('tenant_id', profile.tenant_id).order('position');
  contactSources = data || [];
  const base = '<option value="">Sin fuente</option>';
  $('f-source').innerHTML = base + contactSources.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  $('source-filter').innerHTML = '<option value="">Todas las fuentes</option>' +
    contactSources.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
}

async function loadCompanies() {
  const { data } = await sb.from('crm_companies').select('id,name,cedula_juridica')
    .eq('tenant_id', profile.tenant_id).order('name');
  allCompanies = data || [];
}

// ── CONTACTS ───────────────────────────────────────────────
async function loadContacts() {
  const list = $('contacts-list');
  list.innerHTML = '<div class="state-loading"><div class="spinner"></div><p>Cargando…</p></div>';

  let q = sb.from('contacts')
    .select('*, contact_types(name,color), contact_sources(name), crm_companies(name)')
    .eq('tenant_id', profile.tenant_id).eq('active', true).order('name');

  const tv = $('type-filter').value;
  const sv = $('source-filter').value;
  const sr = $('search-input').value.trim();
  if (tv) q = q.eq('type_id', tv);
  if (sv) q = q.eq('source_id', sv);
  if (sr) q = q.or(`name.ilike.%${sr}%,last_name.ilike.%${sr}%,cedula.ilike.%${sr}%,email.ilike.%${sr}%`);

  const { data, error } = await q;
  if (error) { list.innerHTML = `<div class="state-empty"><h3>Error</h3><p>${esc(error.message)}</p></div>`; return; }

  const contacts = data || [];
  $('count-chip').textContent = contacts.length + (contacts.length !== 1 ? ' clientes' : ' cliente');

  if (!contacts.length) {
    list.innerHTML = '<div class="state-empty"><h3>Sin resultados</h3><p>Prueba otra búsqueda o agrega el primer cliente.</p></div>';
    return;
  }

  list.innerHTML = '<div class="contacts-grid">' + contacts.map(c => {
    const init = ((c.name?.[0]||'')+(c.last_name?.[0]||'')).toUpperCase()||'?';
    const col  = c.contact_types?.color || '#1B6EF3';
    const bg   = col+'18';
    const typ  = c.contact_types?.name  || '';
    return `<div class="contact-card" data-id="${c.id}">
      <div class="avatar" style="background:${bg};color:${col}">${init}</div>
      <div class="contact-main">
        <div class="contact-name">${esc(c.name)}${c.last_name?' '+esc(c.last_name):''}</div>
        <div class="contact-meta">
          ${c.phone?`<span>📱 ${esc(c.phone)}</span>`:''}
          ${c.email?`<span>✉ ${esc(c.email)}</span>`:''}
          ${c.crm_companies?.name?`<span>🏢 ${esc(c.crm_companies.name)}</span>`:''}
        </div>
      </div>
      ${typ?`<span class="type-badge" style="background:${bg};color:${col}">${esc(typ)}</span>`:''}
      <div class="contact-actions">
        ${c.phone?`<button class="action-btn btn-wa" data-phone="${esc(c.phone)}" title="Contactar por WhatsApp">💬</button>`:''}
        ${c.email?`<button class="action-btn btn-email" data-email="${esc(c.email)}" title="Enviar email">✉</button>`:''}
        <button class="action-btn danger btn-del" data-id="${c.id}" title="Eliminar">🗑</button>
      </div>
    </div>`;
  }).join('') + '</div>';

  list.querySelectorAll('.contact-card').forEach(card =>
    card.addEventListener('click', () => openModal(card.dataset.id)));
  list.querySelectorAll('.btn-wa').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); openWA(btn.dataset.phone); }));
  list.querySelectorAll('.btn-email').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); window.location.href = 'mailto:'+btn.dataset.email; }));
  list.querySelectorAll('.btn-del').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); deleteContact(btn.dataset.id); }));
}

// ── MODAL ──────────────────────────────────────────────────
async function openModal(id = null) {
  editingId = id;
  $('modal-title').textContent = id ? 'Editar cliente' : 'Nuevo cliente';
  clearForm();
  if (id) {
    const { data } = await sb.from('contacts').select('*').eq('id', id).single();
    if (data) fillForm(data);
  }
  $('modal-overlay').classList.add('open');
  setTimeout(() => $('f-name').focus(), 200);
}

function closeModal() {
  $('modal-overlay').classList.remove('open');
  editingId = null;
}

function clearForm() {
  ['f-cedula','f-name','f-last-name','f-email','f-phone','f-phone-alt',
   'f-instagram','f-linkedin','f-facebook','f-tiktok','f-notes',
   'f-company-name','f-company-cedula','f-birth-date','f-company-id'].forEach(id => {
    const el = $(id); if (el) el.value = '';
  });
  $('f-cedula-tipo').value = 'fisica';
  $('f-type').value = ''; $('f-source').value = '';
  $('result-cedula').className  = 'lookup-result';
  $('result-empresa').className = 'lookup-result';
  $('co-suggestions').style.display = 'none';
}

function fillForm(d) {
  const set = (id, v) => { const el=$(id); if(el) el.value = v??''; };
  set('f-cedula',      d.cedula);      set('f-cedula-tipo', d.cedula_tipo||'fisica');
  set('f-name',        d.name);        set('f-last-name',   d.last_name);
  set('f-birth-date',  d.birth_date);  set('f-type',        d.type_id);
  set('f-source',      d.source_id);   set('f-email',        d.email);
  set('f-phone',       d.phone);       set('f-phone-alt',   d.phone_alt);
  set('f-instagram',   d.instagram);   set('f-linkedin',    d.linkedin);
  set('f-facebook',    d.facebook);    set('f-tiktok',      d.tiktok);
  set('f-notes',       d.notes);       set('f-company-id',  d.company_id);
  if (d.company_id) {
    const co = allCompanies.find(c => c.id === d.company_id);
    if (co) set('f-company-name', co.name);
  }
}

// ── SAVE ───────────────────────────────────────────────────
async function saveContact() {
  const name = $('f-name').value.trim();
  if (!name) { showToast('El nombre es obligatorio', 'error'); return; }

  // Validar cédula según tipo
  const cedVal = validateCedula();
  if (!cedVal.ok) { showLookup('result-cedula','err', cedVal.msg); $('f-cedula').focus(); return; }

  // Al menos email o teléfono
  const email = $('f-email').value.trim();
  const phone = $('f-phone').value.trim();
  if (!email && !phone) {
    showToast('Ingresa al menos un email o teléfono/WhatsApp', 'error');
    $('f-email').focus();
    return;
  }

  const btn = $('btn-save'); btn.disabled = true; btn.textContent = 'Guardando…';

  // Empresa
  let companyId = $('f-company-id').value || null;
  const coName  = $('f-company-name').value.trim();
  const coCed   = $('f-company-cedula').value.trim();
  if (coName && !companyId) {
    const found = allCompanies.find(c => c.name.toLowerCase() === coName.toLowerCase());
    if (found) {
      companyId = found.id;
    } else {
      const { data: nc } = await sb.from('crm_companies').insert({
        tenant_id: profile.tenant_id, created_by: currentUser.id,
        name: coName, cedula_juridica: coCed || null,
      }).select().single();
      if (nc) { companyId = nc.id; allCompanies.push(nc); }
    }
  }

  const payload = {
    cedula:      $('f-cedula').value.trim()      || null,
    cedula_tipo: $('f-cedula-tipo').value,
    name,
    last_name:   $('f-last-name').value.trim()   || null,
    birth_date:  $('f-birth-date').value          || null,
    type_id:     $('f-type').value                || null,
    source_id:   $('f-source').value              || null,
    email:       $('f-email').value.trim()        || null,
    phone:       $('f-phone').value.trim()        || null,
    phone_alt:   $('f-phone-alt').value.trim()    || null,
    company_id:  companyId,
    instagram:   $('f-instagram').value.trim()    || null,
    linkedin:    $('f-linkedin').value.trim()     || null,
    facebook:    $('f-facebook').value.trim()     || null,
    tiktok:      $('f-tiktok').value.trim()       || null,
    notes:       $('f-notes').value.trim()        || null,
  };

  const { error } = editingId
    ? await sb.from('contacts').update(payload).eq('id', editingId)
    : await sb.from('contacts').insert({ ...payload, tenant_id: profile.tenant_id, created_by: currentUser.id });

  btn.disabled = false; btn.textContent = 'Guardar cliente';
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast(editingId ? 'Cliente actualizado ✓' : 'Cliente creado ✓', 'success');
  closeModal();
  loadContacts();
}

// ── DELETE ──────────────────────────────────────────────────
async function deleteContact(id) {
  if (!confirm('¿Eliminar este cliente?')) return;
  const { error } = await sb.from('contacts').update({ active: false }).eq('id', id);
  if (error) { showToast('Error al eliminar', 'error'); return; }
  showToast('Cliente eliminado', 'success');
  loadContacts();
}

// ── HACIENDA ────────────────────────────────────────────────
async function lookupCedula() {
  const tipo = $('f-cedula-tipo').value;
  if (tipo === 'pasaporte') {
    showLookup('result-cedula','err','No se puede consultar pasaporte en Hacienda');
    return;
  }
  // Validar formato antes de consultar
  const cedVal = validateCedula();
  if (!cedVal.ok) { showLookup('result-cedula','err', cedVal.msg); return; }
  const raw = $('f-cedula').value.replace(/\D/g,'');
  const btn = $('btn-lookup-cedula'); btn.disabled=true; btn.textContent='Consultando…';
  try {
    const r = await fetch(`https://api.hacienda.go.cr/fe/ae?identificacion=${raw}`);
    if (!r.ok) throw 0;
    const d = await r.json();
    if (!d.nombre) throw 0;
    // Hacienda devuelve: NOMBRE(S) APELLIDO1 APELLIDO2
    // Las últimas 2 palabras son siempre los apellidos; el resto es el nombre
    const cap = s => s.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
    const parts = d.nombre.trim().split(/\s+/);
    // física y dimex tienen mismo formato: NOMBRE(S) APELLIDO1 APELLIDO2
    const tipo = $('f-cedula-tipo').value;
    if ((tipo === 'fisica' || tipo === 'dimex') && parts.length >= 3) {
      $('f-name').value      = cap(parts.slice(0, -2).join(' '));
      $('f-last-name').value = cap(parts.slice(-2).join(' '));
    } else {
      $('f-name').value = cap(d.nombre);
    }
    const extra = d.situacion?.moroso==='SI' ? ' · ⚠ Moroso en Hacienda' : '';
    showLookup('result-cedula','ok',`✓ ${d.nombre}${extra}`);
  } catch { showLookup('result-cedula','err','No encontrado — completa los datos manualmente'); }
  btn.disabled=false; btn.textContent='Consultar →';
}

async function lookupEmpresa() {
  const raw = $('f-company-cedula').value.replace(/\D/g,'');
  if (!raw) return;
  const btn = $('btn-lookup-empresa'); btn.disabled=true; btn.textContent='Consultando…';
  try {
    const r = await fetch(`https://api.hacienda.go.cr/fe/ae?identificacion=${raw}`);
    if (!r.ok) throw 0;
    const d = await r.json();
    if (!d.nombre) throw 0;
    $('f-company-name').value = d.nombre;
    showLookup('result-empresa','ok',`✓ ${d.nombre}`);
  } catch { showLookup('result-empresa','err','No encontrada'); }
  btn.disabled=false; btn.textContent='Consultar →';
}

// ── COMPANY AUTOCOMPLETE ─────────────────────────────────────
function filterCompanies(q) {
  const sug = $('co-suggestions'), lst = $('co-list');
  if (!q || q.length < 2) { sug.style.display='none'; return; }
  const hits = allCompanies.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if (!hits.length) { sug.style.display='none'; return; }
  lst.innerHTML = hits.map(c=>`
    <div class="company-item" data-id="${c.id}" data-name="${esc(c.name)}" data-ced="${esc(c.cedula_juridica||'')}">
      <strong>${esc(c.name)}</strong>${c.cedula_juridica?`<small>${esc(c.cedula_juridica)}</small>`:''}
    </div>`).join('');
  sug.style.display = 'block';
  lst.querySelectorAll('.company-item').forEach(item => item.addEventListener('click', () => {
    $('f-company-name').value   = item.dataset.name;
    $('f-company-cedula').value = item.dataset.ced;
    $('f-company-id').value     = item.dataset.id;
    sug.style.display = 'none';
  }));
}

// ── SOCIAL ──────────────────────────────────────────────────
function searchSocial(red) {
  const nombre = ($('f-name').value+' '+$('f-last-name').value).trim();
  window.open(`https://www.google.com/search?q=${encodeURIComponent((nombre?nombre+' ':'')+'site:'+red+'.com')}`, '_blank');
}

function openWA(phone) {
  if (!phone) return;
  const n = phone.replace(/\D/g,'');
  window.open(`https://wa.me/${n.length<=8?'506'+n:n}`, '_blank');
}

// ── EVENT LISTENERS (todos aquí, cero inline en HTML) ────────
$('btn-new').addEventListener('click', () => openModal());
$('type-filter').addEventListener('change', loadContacts);
$('source-filter').addEventListener('change', loadContacts);
$('search-input').addEventListener('input', () => {
  clearTimeout(searchTimer); searchTimer = setTimeout(loadContacts, 300);
});
$('btn-close').addEventListener('click', closeModal);
$('btn-cancel').addEventListener('click', closeModal);
$('modal-overlay').addEventListener('click', e => { if (e.target === $('modal-overlay')) closeModal(); });
$('btn-save').addEventListener('click', saveContact);
$('btn-lookup-cedula').addEventListener('click', lookupCedula);
$('btn-lookup-empresa').addEventListener('click', lookupEmpresa);
$('f-cedula').addEventListener('input', () => fmtCedula($('f-cedula')));
$('f-cedula-tipo').addEventListener('change', () => {
  $('f-cedula').value = '';
  $('result-cedula').className = 'lookup-result';
  // Deshabilitar botón consultar cuando es pasaporte
  const esPasaporte = $('f-cedula-tipo').value === 'pasaporte';
  $('btn-lookup-cedula').disabled = esPasaporte;
  $('btn-lookup-cedula').title = esPasaporte ? 'No disponible para pasaporte' : 'Consultar en Hacienda CR';
});
$('f-phone').addEventListener('input', () => fmtPhone($('f-phone')));
$('f-phone-alt').addEventListener('input', () => fmtPhone($('f-phone-alt')));
$('f-company-name').addEventListener('input', e => { $('f-company-id').value=''; filterCompanies(e.target.value); });
document.addEventListener('click', e => {
  if (!e.target.closest('#f-company-name') && !e.target.closest('#co-suggestions'))
    $('co-suggestions').style.display = 'none';
});
$('btn-ig').addEventListener('click', () => searchSocial('instagram'));
$('btn-li').addEventListener('click', () => searchSocial('linkedin'));
$('btn-fb').addEventListener('click', () => searchSocial('facebook'));
$('btn-tt').addEventListener('click', () => searchSocial('tiktok'));
$('tab-deals').addEventListener('click', () => window.location.href = '/dev/crm/deals/');
$('tab-properties').addEventListener('click', () => window.location.href = '/dev/crm/properties/');
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); $('search-input').focus(); }
});

// ── INIT ─────────────────────────────────────────────────────
await Promise.all([loadTypes(), loadSources(), loadCompanies()]);
await loadContacts();
</script>
