<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valoraciones — PropTools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --blue:    #1B6EF3;
  --ink:     #0D0F12;
  --ink-mid: #5A6070;
  --surface: #fff;
  --surface2:#F4F5F7;
  --border:  #E2E5EA;
  --muted:   #9CA3AF;
  --red:     #E53E3E;
  --green:   #22C55E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--surface2); color: var(--ink); font-size: 14px; }

/* LAYOUT */
#pt-header { height: 88px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 100; }
.page-body { padding-bottom: 64px; }
#pt-footer { height: 48px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 12px; color: var(--muted); }

/* RESULTS BAR */
.results-bar { position: sticky; top: 88px; z-index: 90; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; gap: 0; overflow-x: auto; }
.results-bar-item { flex: 1; min-width: 120px; padding: 0 16px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 1px; }
.results-bar-item:first-child { padding-left: 0; }
.results-bar-item:last-child { border-right: none; }
.rbi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.rbi-usd { font-size: 15px; font-weight: 700; color: var(--ink); }
.rbi-col { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.rbi-total .rbi-usd { color: var(--blue); font-size: 18px; }
.rbi-total .rbi-label { color: var(--blue); }

/* SPLIT LAYOUT */
.page-wrap { display: grid; grid-template-columns: 1fr 300px; gap: 20px; max-width: 1120px; margin: 0 auto; padding: 24px; align-items: start; }
.col-form { min-width: 0; }
.col-saves { min-width: 0; position: sticky; top: 140px; }
@media (max-width: 860px) { .page-wrap { grid-template-columns: 1fr; } .col-saves { position: static; } }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 11px; font-weight: 700; color: var(--ink-mid); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

/* FORM */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
@media (max-width: 700px) { .grid4 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: var(--ink-mid); font-weight: 500; }
input[type=text], input[type=number], input[type=date], select, textarea {
  height: 36px; padding: 0 10px; border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink);
  background: var(--surface); outline: none; transition: border-color .15s; width: 100%;
}
textarea { height: auto; padding: 8px 10px; resize: vertical; }
input:focus, select:focus, textarea:focus { border-color: var(--blue); }
input[readonly], select[disabled] { background: var(--surface2); color: var(--ink-mid); cursor: default; }

/* BUTTONS */
.btn { height: 36px; padding: 0 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); cursor: pointer; transition: background .15s; white-space: nowrap; }
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #155bd4; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: #fff5f5; }
.btn-del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; padding: 4px; }
.btn-del:hover { color: var(--red); }

/* COMPLEMENTARIAS */
.compl-row { display: grid; grid-template-columns: 150px 1fr 90px 70px 32px; gap: 8px; align-items: end; margin-bottom: 8px; }
@media (max-width: 600px) { .compl-row { grid-template-columns: 1fr 1fr 1fr 1fr 32px; } }

/* SAVES LIST */
.save-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 6px; gap: 8px; }
.save-item-info { flex: 1; min-width: 0; }
.save-item-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.save-item-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
.save-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
.save-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 20px 0; }

/* STATUS */
.status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); padding: 6px 0; min-height: 28px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.saving { background: #f59e0b; }
.dot.saved { background: var(--green); }
.dot.error { background: var(--red); }

/* LOADER */
.loading-overlay { position: fixed; inset: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; z-index: 999; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<header id="pt-header"></header>

<!-- ── BARRA DE RESULTADOS sticky ── -->
<div class="results-bar">
  <div class="results-bar-item">
    <span class="rbi-label">Terreno</span>
    <span class="rbi-usd" id="r_terr_usd">$0</span>
    <span class="rbi-col" id="r_terr_col">₡0</span>
  </div>
  <div class="results-bar-item">
    <span class="rbi-label">Construcción base</span>
    <span class="rbi-usd" id="r_base_usd">$0</span>
    <span class="rbi-col" id="r_base_col">₡0</span>
  </div>
  <div class="results-bar-item">
    <span class="rbi-label">Construcción depreciada</span>
    <span class="rbi-usd" id="r_depr_usd">$0</span>
    <span class="rbi-col" id="r_depr_col">₡0</span>
  </div>
  <div class="results-bar-item">
    <span class="rbi-label">Coef. depreciación</span>
    <span class="rbi-usd" id="r_coef">—</span>
    <span class="rbi-col" id="r_edad">0 años</span>
  </div>
  <div class="results-bar-item">
    <span class="rbi-label">Obras compl.</span>
    <span class="rbi-usd" id="r_compl_usd">$0</span>
    <span class="rbi-col" id="r_compl_col">₡0</span>
  </div>
  <div class="results-bar-item rbi-total">
    <span class="rbi-label">Total estimado</span>
    <span class="rbi-usd" id="r_total_usd">$0</span>
    <span class="rbi-col" id="r_total_col">₡0</span>
  </div>
</div>

<div class="page-body">
  <div class="page-wrap">
    <div class="col-form">

      <div class="card">

            <button class="btn btn-sm" onclick="exportarPDF()">Exportar PDF</button>
          </div>
        </div>
        <div class="status-bar"><div class="dot" id="statusDot"></div><span id="statusMsg">Sin cambios</span><div style="display:flex;align-items:center;gap:6px;margin-left:auto"><span id="tcMeta" style="font-size:11px;color:var(--muted)"></span><input type="number" id="f_tc" min="1" value="530" oninput="calcular();markDirty()" style="width:72px;height:24px;font-size:11px;padding:0 6px;border:1px solid var(--border);border-radius:6px;font-family:inherit;color:var(--ink);background:var(--surface2)"><button class="btn btn-sm" id="btnTC" onclick="fetchTipoCambio()" title="Tipo de cambio del día" style="width:24px;height:24px;font-size:13px;padding:0">↻</button></div></div>
        <div class="grid3" style="margin-top:8px">
          <div class="field"><label>Referencia / expediente</label><input type="text" id="f_ref" placeholder="Ej: Avicenia 2026-001" oninput="markDirty()"></div>
          <div class="field"><label>Obra que se valora</label><input type="text" id="f_obra" placeholder="Casa y lote" oninput="markDirty()"></div>
          <div class="field"><label>Fecha de valoración</label><input type="date" id="f_fecha" oninput="markDirty()"></div>
        </div>
        <div class="grid3" style="margin-top:10px">
          <div class="field"><label>Provincia</label><select id="f_provincia" onchange="onProvincia();markDirty()"><option value="">— Escoger —</option></select></div>
          <div class="field"><label>Cantón</label><select id="f_canton" onchange="onCanton();markDirty()" disabled><option value="">— Escoger —</option></select></div>
          <div class="field"><label>Distrito</label><select id="f_distrito" onchange="onDistrito();markDirty()" disabled><option value="">— Escoger —</option></select></div>
        </div>
        <div style="margin-top:8px">

        </div>
        <div style="margin-top:8px">
          <div class="field"><label>Notas</label><textarea id="f_notas" rows="1" placeholder="Observaciones…" oninput="markDirty()"></textarea></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span>Construcción</span>
          <span style="font-size:11px;font-weight:400;color:var(--ink-mid)">Coef. Ross-Heidecke: <strong id="r_coef_inline" style="color:var(--blue)">—</strong></span>
        </div>
        <div class="grid3">
          <div class="field"><label>Área construcción (m²)</label><input type="number" id="f_areaConst" min="0" value="0" oninput="calcular();markDirty()"></div>
          <div class="field"><label>Años de construcción</label><input type="number" id="f_aniosConst" min="0" max="200" value="0" oninput="calcular();markDirty()"></div>
          <div class="field">
            <label>Estado de conservación</label>
            <select id="f_estado" onchange="calcular();markDirty()">
              <option value="">— Escoger —</option>
              <option value="0">Óptimo — 0%</option>
              <option value="0.32">Muy bueno — 0.32%</option>
              <option value="2.52">Bueno — 2.52%</option>
              <option value="8.09">Intermedio — 8.09%</option>
              <option value="18.1">Regular — 18.1%</option>
              <option value="31.36">Malo — 31.36%</option>
              <option value="52.6">Deficiente — 52.6%</option>
              <option value="72.2">Muy malo — 72.2%</option>
              <option value="100">Demolición — 100%</option>
            </select>
          </div>
        </div>
        <div class="grid3" style="margin-top:10px">
          <div class="field"><label>Tipología principal</label><select id="f_tipoPrinc" onchange="syncVidaUtil();calcular();markDirty()"></select></div>
          <div class="field"><label>Vida útil (años)</label><input type="text" id="f_vidaUtil" readonly></div>
          <div class="field"><label>Edad efectiva (calc.)</label><input type="text" id="f_edadEf" readonly></div>
        </div>
        <div class="grid3" style="margin-top:10px">
          <div class="field"><label>% remodelación</label><input type="number" id="f_pctRemodel" min="0" max="100" step="1" value="0" oninput="calcular();markDirty()"></div>
          <div class="field"><label>Años desde remodelación</label><input type="number" id="f_aniosRemodel" min="0" max="200" value="0" oninput="calcular();markDirty()"></div>
          <div class="field"><label>Segunda tipología (opc.)</label><select id="f_tipoSeg" onchange="calcular();markDirty()"><option value="">— ninguna —</option></select></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Terreno</div>
        <div class="grid2">
          <div class="field"><label>Área del lote (m²)</label><input type="number" id="f_areaLote" min="0" value="0" oninput="calcular();markDirty()"></div>
          <div class="field">
            <label>Valor tributario m² lote (¢)</label>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="number" id="f_valMt2" min="0" value="0" oninput="calcular();markDirty()" style="flex:1">
              <button class="btn btn-sm" onclick="abrirPDFZonas()" title="Ver mapa de zonas homogéneas (Hacienda)" style="flex-shrink:0;padding:0 8px;font-size:11px;white-space:nowrap;height:36px">
                Ver zonas
              </button>
            </div>
          </div>


        </div>

      </div>

      <div class="card">
        <div class="card-title">
          <span>Obras complementarias</span>
          <button class="btn btn-sm" onclick="addCompl()">+ Agregar</button>
        </div>
        <div id="complContainer"><div class="save-empty">Sin obras complementarias.</div></div>
      </div>


    </div><!-- /col-form -->

    <!-- ── COLUMNA DERECHA: guardados ── -->
    <div class="col-saves">
      <div class="card">
        <div class="card-title">
          <span>Mis valoraciones</span>
          <button class="btn btn-sm btn-primary" onclick="nuevoAvaluo()">+ Nuevo</button>
        </div>
        <div id="savesList"><div class="save-empty">Cargando…</div></div>
      </div>
    </div><!-- /col-saves -->

  </div><!-- /page-wrap -->
</div><!-- /page-body -->

<footer id="pt-footer"></footer>

function onProvincia() {
  var prov = document.getElementById('f_provincia').value;
  var sc = document.getElementById('f_canton');
  var sd = document.getElementById('f_distrito');
  sc.innerHTML = '<option value="">— Escoger —</option>';
  sd.innerHTML = '<option value="">— Escoger —</option>';
  sc.disabled = !prov; sd.disabled = true;
  if (prov && CR_DATA[prov]) {
    Object.keys(CR_DATA[prov]).forEach(function(c) { sc.appendChild(new Option(c, c)); });
  }
}
function onCanton() {
  var prov = document.getElementById('f_provincia').value;
  var cant = document.getElementById('f_canton').value;
  var sd = document.getElementById('f_distrito');
  sd.innerHTML = '<option value="">— Escoger —</option>';
  sd.disabled = !cant;
  if (prov && cant && CR_DATA[prov] && CR_DATA[prov][cant]) {
    CR_DATA[prov][cant].forEach(function(d) { sd.appendChild(new Option(d, d)); });
  }
}
function onDistrito() {}
function initProvincias() {
  var sp = document.getElementById('f_provincia');
  if (!sp) return;
  Object.keys(CR_DATA).forEach(function(p) { sp.appendChild(new Option(p, p)); });
}
function setUbicacionSelects(prov, cant, dist) {
  var sp = document.getElementById('f_provincia');
  var sc = document.getElementById('f_canton');
  var sd = document.getElementById('f_distrito');
  if (prov) {
    sp.value = prov; onProvincia();
    if (cant) { sc.value = cant; onCanton(); if (dist) sd.value = dist; }
  }
}

function abrirPDFZonas() {
  var sprov = document.getElementById('f_provincia');
  var scant = document.getElementById('f_canton');
  var prov  = sprov ? sprov.value : '';
  var cant  = scant ? scant.value : '';
  if (!prov || !cant) {
    alert('Seleccioná provincia y cantón primero.');
    return;
  }
  var key = prov + '|' + cant;
  var url = CANTON_PDF[key];
  if (!url) {
    // Fallback: open Hacienda ONT page
    window.open('https://www.hacienda.go.cr/ont/mapavalores.html', '_blank');
    return;
  }
  window.open(url, '_blank');
}


function generarPDF(d, logoUrl) {
  if (typeof jspdf === 'undefined') { alert('jsPDF no disponible'); return; }
  var JP = jspdf.jsPDF;

  function n$(v) { return '$' + Math.round(v || 0).toLocaleString('es-CR'); }
  function nC(v) { return String.fromCharCode(8353) + Math.round(v || 0).toLocaleString('es-CR'); }
  function safe(s) { return (s || '').replace(/[\u0100-\uFFFF]/g, function(c){ return c; }); }

  function buildDoc(logo) {
    var doc = new JP({ unit:'mm', format:'a4', putOnlyUsedFonts:true });
    var W=210, M=18, LW=174, y=M;

    function row(lbl, val) {
      if (y > 272) { doc.addPage(); y = M; }
      doc.setFontSize(9); doc.setTextColor(110,110,110);
      doc.text(safe(lbl), M, y);
      doc.setFontSize(10); doc.setTextColor(20,20,20);
      doc.text(safe(String(val || '')), M+LW, y, { align:'right' });
      y += 6;
    }
    function sep() { doc.setDrawColor(210,210,210); doc.line(M,y,M+LW,y); y+=4; }
    function sect(t) {
      if (y > 262) { doc.addPage(); y = M; }
      doc.setFillColor(237,244,253); doc.rect(M, y-4, LW, 7, 'F');
      doc.setFontSize(9); doc.setFont(undefined,'bold'); doc.setTextColor(20,80,160);
      doc.text(safe(t.toUpperCase()), M+2, y);
      doc.setFont(undefined,'normal'); y += 7;
    }

    var HH = logo ? 22 : 14;
    doc.setFillColor(24,95,165); doc.rect(0,0,210,HH,'F');
    if (logo) {
      try { doc.addImage(logo,'PNG', W-M-44, (HH-13)/2, 44, 13, '', 'FAST'); } catch(e){}
    }
    doc.setFontSize(12); doc.setTextColor(255,255,255); doc.setFont(undefined,'bold');
    doc.text('Valoracion de Propiedad - Formula de Ross-Heidecke', M, logo ? HH/2-1 : 9);
    if (logo) {
      doc.setFontSize(8); doc.setFont(undefined,'normal'); doc.setTextColor(180,210,255);
      doc.text('Tipologia ONT / Ministerio de Hacienda CR', M, HH/2+4);
    }
    doc.setFont(undefined,'normal'); y = HH + 7;

    sect('Datos generales');
    row('Referencia', d.ref);
    row('Obra valorada', d.obra);
    row('Fecha de valoracion', d.fecha);
    row('Ubicacion', d.ubicacion);
    if (d.notas) row('Notas', d.notas);
    sep();

    sect('Construccion');
    row('Tipologia principal', d.tipoPrincipal);
    if (d.tipoSegunda) row('Segunda tipologia', d.tipoSegunda);
    row('Area de construccion', (d.areaC||0) + ' m2');
    row('Anos de construccion', d.aniosC||0);
    row('% remodelacion', ((d.pctR||0)*100).toFixed(0)+'%');
    row('Anos desde remodelacion', d.aniosR||0);
    row('Vida util', (d.vidaUtil||90)+' anos');
    row('Coef. deprec. Ross-Heidecke', ((d.coefRH!=null?d.coefRH:d.coefPct)||0).toFixed(2)+'%');
    row('Edad efectiva', (d.edadEf||0).toFixed(2)+' anos');
    sep();

    sect('Terreno');
    row('Area del lote', (d.areaL||0)+' m2');
    row('Valor tributario m2 lote', nC(d.valMt2));
    row('Anno mapa homogeneo', d.anioMapa);
    row('Tipo de cambio', String.fromCharCode(8353)+(d.tc||530));
    sep();

    if (d.complList && d.complList.length) {
      sect('Obras complementarias');
      d.complList.forEach(function(c) {
        if (c.tipologia) row(c.tipologia + (c.descripcion ? ' - '+c.descripcion : ''), 'x'+(c.cantidad||1));
      });
      sep();
    }

    sect('Resumen de valores');
    var tc = d.tc || 530;
    row('Valor del terreno',         n$((d.terrenoC||0)/tc)  +'   '+ nC(d.terrenoC));
    row('Construccion base',         n$((d.constBaseC||0)/tc)+'   '+ nC(d.constBaseC));
    row('Construccion depreciada',   n$((d.constDeprC||0)/tc)+'   '+ nC(d.constDeprC));
    row('Obras complementarias',     n$((d.complC||0)/tc)    +'   '+ nC(d.complC));
    sep();

    doc.setFillColor(229,241,253); doc.rect(M, y-2, LW, 11, 'F');
    doc.setFontSize(11); doc.setFont(undefined,'bold'); doc.setTextColor(20,80,160);
    doc.text('Total valor estimado', M+2, y+5);
    doc.text(n$((d.totalC||0)/tc)+'   '+nC(d.totalC), M+LW, y+5, {align:'right'});
    doc.setFont(undefined,'normal'); y += 16;

    var pgs = doc.getNumberOfPages();

// ── CÁLCULO ──────────────────────────────────────────────────
let lastCalc = {};

window.calcular = function() {
  const tc       = parseFloat(document.getElementById('f_tc').value) || 530;
  const aniosC   = parseFloat(document.getElementById('f_aniosConst').value) || 0;
  const pctR     = (parseFloat(document.getElementById('f_pctRemodel').value) || 0) / 100;
  const aniosR   = parseFloat(document.getElementById('f_aniosRemodel').value) || 0;
  const coefPct  = parseFloat(document.getElementById('f_estado').value) || 0;
  const areaC    = parseFloat(document.getElementById('f_areaConst').value) || 0;
  const areaL    = parseFloat(document.getElementById('f_areaLote').value) || 0;
  const valMt2   = parseFloat(document.getElementById('f_valMt2').value) || 0;
  const anioMapa = '2023'; // fijo

  const vidaUtil = parseFloat(document.getElementById('f_vidaUtil').value) || 90;
  const edadEf = Math.max(0, aniosC - (pctR * aniosR));

  // Fórmula de Ross-Heidecke:
  // D = (e/V)² × 100 + estadoConserv × (1 − (e/V)²)
  // donde e = edad efectiva, V = vida útil, estadoConserv = coef. de conservación %
  const ratio = Math.min(edadEf / vidaUtil, 1);
  const coefRH = ratio * ratio * 100 + coefPct * (1 - ratio * ratio);

  document.getElementById('f_edadEf').value = edadEf.toFixed(2);
  document.getElementById('r_edad').textContent = edadEf.toFixed(2) + ' años';
  document.getElementById('r_coef').textContent = coefRH.toFixed(2) + '%';
  var _ci = document.getElementById('r_coef_inline'); if(_ci) _ci.textContent = coefRH.toFixed(2) + '%';
  const inlineCoef = document.getElementById('r_coef_inline');
  if (inlineCoef) inlineCoef.textContent = coefRH.toFixed(2) + '%';

  const tP = getTip(document.getElementById('f_tipoPrinc').value);
  const tipSeg = document.getElementById('f_tipoSeg').value;
  const tS = tipSeg ? getTip(tipSeg) : null;

  let constBaseC = 0;
  if (tP && areaC > 0) {
    const pu = tS ? (tP[1] + tS[1]) / 2 : tP[1];
    constBaseC = pu * areaC * inflAcum(2020);
  }
  const constDeprC = constBaseC * (1 - coefRH / 100);
  const terrenoC   = areaL * valMt2 * inflAcum(anioMapa);

  let complC = 0;
  complList.forEach(({ id }) => {
    const t = getTip(document.getElementById(`ct_${id}`)?.value);
    const q = parseFloat(document.getElementById(`cq_${id}`)?.value) || 0;
    if (t) complC += t[1] * q;
  });

  const totalC = terrenoC + constDeprC + complC;

  document.getElementById('r_terr_usd').textContent  = fmt$(terrenoC / tc);
  document.getElementById('r_terr_col').textContent  = fmtC(terrenoC);
  document.getElementById('r_base_usd').textContent  = fmt$(constBaseC / tc);
  document.getElementById('r_base_col').textContent  = fmtC(constBaseC);
  document.getElementById('r_depr_usd').textContent  = fmt$(constDeprC / tc);
  document.getElementById('r_depr_col').textContent  = fmtC(constDeprC);
  document.getElementById('r_compl_usd').textContent = fmt$(complC / tc);
  document.getElementById('r_compl_col').textContent = fmtC(complC);
  document.getElementById('r_total_usd').textContent = fmt$(totalC / tc);
  document.getElementById('r_total_col').textContent = fmtC(totalC);

  lastCalc = { tc, aniosC, pctR, aniosR, coefPct, coefRH, vidaUtil, areaC, areaL, valMt2, anioMapa,
    edadEf, constBaseC, constDeprC, terrenoC, complC, totalC };
};

window.guardar = async function() {

  setStatus('saving', 'Guardando…', '');
  document.getElementById('btnGuardar').disabled = true;

  const row = {
    user_id:    currentUser.id,
    tenant_id:  currentProfile.tenant_id,

    provincia:  document.getElementById('f_provincia')?.value || '',
    canton:     document.getElementById('f_canton')?.value || '',
    distrito:   document.getElementById('f_distrito')?.value || '',
    ubicacion:  document.getElementById('f_ubicacion').value,
    notas:      document.getElementById('f_notas').value,
    tipo_principal:     document.getElementById('f_tipoPrinc').value,
    tipo_segunda:       document.getElementById('f_tipoSeg').value || null,
    area_construccion:  parseFloat(document.getElementById('f_areaConst').value) || 0,
    anios_construccion: parseFloat(document.getElementById('f_aniosConst').value) || 0,
    pct_remodelacion:   (parseFloat(document.getElementById('f_pctRemodel').value) || 0) / 100,
    anios_remodelacion: parseFloat(document.getElementById('f_aniosRemodel').value) || 0,
    vida_util:          parseFloat(document.getElementById('f_vidaUtil').value) || 90,
    estado_conservacion:parseFloat(document.getElementById('f_estado').value) || 0,
    area_lote:  parseFloat(document.getElementById('f_areaLote').value) || 0,
    val_mt2_lote: parseFloat(document.getElementById('f_valMt2').value) || 0,
    anio_mapa:  2023,
    tipo_cambio: parseFloat(document.getElementById('f_tc').value) || 530,
    complementarias: complList.map(({ id }) => ({
      tipologia:   document.getElementById(`ct_${id}`)?.value,
      descripcion: document.getElementById(`cd_${id}`)?.value,
      cantidad:    parseFloat(document.getElementById(`cq_${id}`)?.value) || 1,
    })),
    resultado_terreno_col:   lastCalc.terrenoC   || 0,
    resultado_const_base_col:lastCalc.constBaseC || 0,
    resultado_const_depr_col:lastCalc.constDeprC || 0,
    resultado_compl_col:     lastCalc.complC     || 0,
    resultado_total_col:     lastCalc.totalC     || 0,
    resultado_total_usd:     lastCalc.totalC ? lastCalc.totalC / (lastCalc.tc || 530) : 0,
  };

  let error;
  if (currentAvaluoId) {
    ({ error } = await sb.from('avaluos').update(row).eq('id', currentAvaluoId));
  } else {
    const { data, error: err } = await sb.from('avaluos').insert(row).select('id').single();
    error = err;
    if (data) currentAvaluoId = data.id;
  }

  document.getElementById('btnGuardar').disabled = false;
  if (error) {
    setStatus('error', 'Error al guardar', error.message);
  } else {
    isDirty = false;
    setStatus('saved', 'Guardado', new Date().toLocaleTimeString('es-CR'));
    await cargarLista();
  }
};

async function cargarLista() {
  const { data, error } = await sb.from('avaluos')
    .select('id, referencia, obra, fecha_avaluo, resultado_total_usd, updated_at')
    .eq('user_id', currentUser.id)
    .order('updated_at', { ascending: false })
    .limit(50);

  const el = document.getElementById('savesList');
  if (error || !data?.length) {
    el.innerHTML = '<div class="save-empty">Sin valoraciones guardadas aún.</div>';
    return;
  }
  el.innerHTML = data.map(a => {
    const fecha = a.fecha_avaluo || a.updated_at?.split('T')[0];
    const total = a.resultado_total_usd ? fmt$(a.resultado_total_usd) : '—';
    const nombre = a.referencia || a.obra || 'Sin nombre';
    const activo = a.id === currentAvaluoId ? 'border:1px solid var(--blue)' : '';
    return `<div class="save-item" style="${activo}">
      <div class="save-item-info">
        <div class="save-item-name">${nombre}</div>
        <div class="save-item-meta">${fecha || '—'} · ${total}</div>
      </div>
      <div class="save-item-actions">
        <button class="btn btn-sm" onclick="cargarAvaluo('${a.id}')">Cargar</button>
        <button class="btn btn-sm" onclick="exportarPDFId('${a.id}')">PDF</button>
        <button class="btn btn-sm btn-danger" onclick="borrarAvaluo('${a.id}')">×</button>
      </div>
    </div>`;
  }).join('');
}

// ── CARGAR AVALÚO ────────────────────────────────────────────
window.cargarAvaluo = async function(id) {
  const { data, error } = await sb.from('avaluos').select('*').eq('id', id).single();
  if (error || !data) return;

  currentAvaluoId = id;
  document.getElementById('f_ref').value       = data.referencia || '';
  document.getElementById('f_obra').value      = data.obra || '';
  document.getElementById('f_fecha').value     = data.fecha_avaluo || '';
  document.getElementById('f_ubicacion').value = data.ubicacion || '';
  setUbicacionSelects(data.provincia || '', data.canton || '', data.distrito || '');
  document.getElementById('f_notas').value     = data.notas || '';
  document.getElementById('f_aniosConst').value  = data.anios_construccion;
  document.getElementById('f_pctRemodel').value  = Math.round((data.pct_remodelacion || 0) * 100);
  document.getElementById('f_aniosRemodel').value= data.anios_remodelacion;
  document.getElementById('f_vidaUtil').value    = data.vida_util;
  document.getElementById('f_estado').value      = data.estado_conservacion;
  document.getElementById('f_areaConst').value   = data.area_construccion;
  document.getElementById('f_areaLote').value    = data.area_lote;
  document.getElementById('f_valMt2').value      = data.val_mt2_lote;
  document.getElementById('f_tc').value          = data.tipo_cambio;

  // selects
  const selPrinc = document.getElementById('f_tipoPrinc');
  if (data.tipo_principal) selPrinc.value = data.tipo_principal;
  const selSeg = document.getElementById('f_tipoSeg');
  selSeg.value = data.tipo_segunda || '';

  // complementarias — store state in complList, renderCompl reads from it
  complList = (data.complementarias || []).map((c, i) => ({
    id: Date.now() + i,
    tipologia:   c.tipologia   || TIPS[0][0],
    descripcion: c.descripcion || '',
    cantidad:    c.cantidad    || 1,
  }));
  renderCompl();

  calcular();
  isDirty = false;
  setStatus('saved', 'Cargado', data.referencia || data.obra || id.slice(0,8));
  cargarLista();
};

// ── BORRAR ───────────────────────────────────────────────────
window.borrarAvaluo = async function(id) {
  if (!confirm('¿Eliminar esta valoración? Esta acción no se puede deshacer.')) return;
  await sb.from('avaluos').delete().eq('id', id);
  if (currentAvaluoId === id) nuevoAvaluo();
  cargarLista();
};

// ── NUEVO ────────────────────────────────────────────────────
window.nuevoAvaluo = function() {
  if (isDirty && !confirm('Hay cambios sin guardar. ¿Continuar sin guardar?')) return;
  currentAvaluoId = null;
  isDirty = false;
  ['f_ref','f_obra','f_ubicacion','f_notas'].forEach(k => { document.getElementById(k).value = ''; });
  document.getElementById('f_provincia').value = '';
  document.getElementById('f_canton').innerHTML = '<option value="">— Escoger —</option>';
  document.getElementById('f_canton').disabled = true;
  document.getElementById('f_distrito').innerHTML = '<option value="">— Escoger —</option>';
  document.getElementById('f_distrito').disabled = true;
  document.getElementById('f_fecha').value = '';
  document.getElementById('f_aniosConst').value = 0;
  document.getElementById('f_pctRemodel').value = 0;
  document.getElementById('f_aniosRemodel').value = 0;
  document.getElementById('f_vidaUtil').value = 90;
  document.getElementById('f_areaConst').value = 0;
  document.getElementById('f_areaLote').value = 0;
  document.getElementById('f_valMt2').value = 0;
  document.getElementById('f_tc').value = 530;
  document.getElementById('f_estado').value = '';
  document.getElementById('f_tipoPrinc').value = '';
  document.getElementById('f_tipoSeg').value = '';

  complList = [];
  renderCompl();
  calcular();
  setStatus('', 'Nueva valoración', '');
};

// ── EXPORT PDF ───────────────────────────────────────────────
// generarPDF lives in a plain <script> above — accessible globally
window.exportarPDF = function() {
  generarPDF(lastCalc, currentProfile?.tenants?.logo_url);
};

window.exportarPDFId = async function(id) {
  const { data } = await sb.from('avaluos').select('*').eq('id', id).single();
  if (!data) return;
  const d = {
    ref: data.referencia, obra: data.obra, fecha: data.fecha_avaluo,
    provincia: data.provincia, canton: data.canton, distrito: data.distrito,
    ubicacion: data.ubicacion, notas: data.notas,
    tipoPrincipal: data.tipo_principal, tipoSegunda: data.tipo_segunda,
    aniosC: data.anios_construccion, pctR: data.pct_remodelacion,
    aniosR: data.anios_remodelacion, vidaUtil: data.vida_util,
    coefPct: data.estado_conservacion, areaC: data.area_construccion,
    areaL: data.area_lote, valMt2: data.val_mt2_lote,
    anioMapa: data.anio_mapa, tc: data.tipo_cambio,
    edadEf: Math.max(0, data.anios_construccion - (data.pct_remodelacion * data.anios_remodelacion)),
    coefRH: (function(){
      var e = Math.max(0, data.anios_construccion-(data.pct_remodelacion*data.anios_remodelacion));
      var V = data.vida_util || 90;
      var r = Math.min(e/V,1);
      return r*r*100 + (data.estado_conservacion||0)*(1-r*r);
    })(),
    constBaseC: data.resultado_const_base_col, constDeprC: data.resultado_const_depr_col,
    terrenoC: data.resultado_terreno_col, complC: data.resultado_compl_col,
    totalC: data.resultado_total_col,
    complList: data.complementarias || [],
  };
  generarPDF(d, currentProfile?.tenants?.logo_url);
};


// ── TIPO DE CAMBIO AUTOMÁTICO ────────────────────────────────
window.fetchTipoCambio = async function() {
  const btn = document.getElementById('btnTC');
  const meta = document.getElementById('tcMeta');
  btn.disabled = true;
  btn.textContent = '…';
  meta.textContent = 'Consultando…';

  try {
    // Edge Function en PROD o STAGING según el entorno
    const fnUrl = SUPABASE_URL.replace('supabase.co', 'supabase.co') + '/functions/v1/tipo-cambio';
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(fnUrl, {
      headers: { Authorization: `Bearer ${session?.access_token}` }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const tc = await res.json();

    if (tc.error) throw new Error(tc.error);

    document.getElementById('f_tc').value = tc.valor;
    calcular();
    markDirty();
    meta.textContent = `Venta ₡${tc.valor} · Compra ₡${tc.compra} · ${tc.fecha}${tc.cached ? ' (cache)' : ''}`;
    meta.style.color = 'var(--green)';
  } catch (err) {
    meta.textContent = `Error: ${err.message} — ingresá el valor manual`;
    meta.style.color = 'var(--red)';
  } finally {
    btn.disabled = false;
    btn.textContent = '↻';
  }
};

// Cargar tipo de cambio automáticamente al iniciar
async function autoFetchTC() {
  // Solo si el campo está en el valor default (530)
  if (parseInt(document.getElementById('f_tc').value) === 530) {
    await fetchTipoCambio();
  }
}

// ── BOOT ─────────────────────────────────────────────────────
init().then(() => autoFetchTC());
</script>
