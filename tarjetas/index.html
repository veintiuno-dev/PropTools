<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjetas de Presentación — PropTools</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0f2f5; --surface: #fff; --surface2: #f5f6f8;
  --border: #e2e4e9; --text: #111318; --muted: #6b7280; --radius: 12px;
}
body { font-family: -apple-system,'Segoe UI',Arial,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* LOGIN */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.login-logo img { height: 22px; }
.login-logo span { font-size: 15px; font-weight: 700; }
.login-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.login-box p { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
.form-field { margin-bottom: 14px; }
.form-field label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
.form-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border-color .15s; }
.form-field input:focus { border-color: #000; }
.btn-login { width: 100%; background: #000; color: #fff; border: none; border-radius: 8px; padding: 12px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; margin-top: 4px; }
.btn-login:hover { background: #222; }
.btn-login:disabled { background: #aaa; cursor: not-allowed; }
.login-error { font-size: 12px; color: #ef4444; margin-top: 10px; text-align: center; display: none; }
.login-footer { margin-top: 20px; text-align: center; font-size: 12px; color: var(--muted); }

/* APP */
.app-screen { display: none; min-height: 100vh; grid-template-columns: 360px 1fr; grid-template-rows: auto 1fr; }
.app-screen.visible { display: grid; }
header { grid-column: 1/-1; padding: 12px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; background: var(--surface); }
header h1 { font-size: 16px; font-weight: 700; }
.header-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.header-sub { font-size: 12px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.header-right img { height: 22px; display: block; }
.db-status { font-size: 11px; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--border); background: var(--surface2); }
.db-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
.btn-logout { font-family: inherit; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .15s; }
.btn-logout:hover { border-color: #ef4444; color: #ef4444; background: #fff5f5; }

/* SIDEBAR */
aside { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 20px; }
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tpl-btn { background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; padding: 8px; cursor: pointer; transition: all .15s; font-family: inherit; overflow: hidden; }
.tpl-btn img { width: 100%; border-radius: 6px; display: block; }
.tpl-btn-label { font-size: 10px; font-weight: 600; color: var(--muted); text-align: center; margin-top: 6px; line-height: 1.3; }
.tpl-btn:hover { border-color: #555; }
.tpl-btn.active { border-color: #000; }
.tpl-btn.active .tpl-btn-label { color: #000; font-weight: 700; }
.field-group { display: flex; flex-direction: column; gap: 8px; }
label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 3px; }
input[type="text"],input[type="url"],input[type="tel"],input[type="email"] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color .15s; }
input:focus { border-color: #000; }
input::placeholder { color: var(--muted); opacity: .45; }
.upload-area { background: var(--surface2); border: 2px dashed var(--border); border-radius: var(--radius); padding: 12px; display: flex; align-items: center; gap: 11px; cursor: pointer; transition: border-color .15s; }
.upload-area:hover { border-color: #888; }
.upload-preview { width: 44px; height: 44px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.upload-preview img { width: 100%; height: 100%; object-fit: cover; }
.upload-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
.upload-text strong { color: var(--text); display: block; font-size: 13px; }
input[type="file"] { display: none; }

/* MAIN */
main { background: var(--bg); overflow-y: auto; display: flex; flex-direction: column; }
.preview-toolbar { padding: 18px 28px 0; display: flex; align-items: center; justify-content: space-between; }
.preview-toolbar h2 { font-size: 16px; font-weight: 700; }
.toolbar-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.btn { font-family: inherit; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: #888; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.preview-area { padding: 20px 28px 28px; display: flex; gap: 28px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
.card-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.card-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.card-canvas-wrap { border-radius: 10px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
canvas { display: block; }

/* FONT LOADING STATUS */
.font-status { font-size: 11px; color: var(--muted); padding: 6px 0; display: flex; align-items: center; gap: 6px; }
.font-dot { width: 7px; height: 7px; border-radius: 50%; background: #f0a500; flex-shrink: 0; }
.font-dot.ok { background: #22c55e; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #000; color: #fff; padding: 10px 22px; border-radius: 100px; font-weight: 700; font-size: 13px; transition: transform .3s cubic-bezier(.34,1.56,.64,1); pointer-events: none; z-index: 1100; }
.toast.show { transform: translateX(-50%) translateY(0); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(
  'https://zsldwaiwcvziqfajcmph.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzbGR3YWl3Y3Z6aXFmYWpjbXBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjQ4NzcsImV4cCI6MjA5MDE0MDg3N30.eFlAAk-fPHI8r8YQPjP8kYnohziRpGu9whGpgfaW-KU'
);

/* ══════════════════════════════
   DIMENSIONES
   Tarjeta: 9x5cm a 300dpi = 1063x591px (landscape)
   Pero el diseño está en portrait = 591x1063px
   Display a ~60%: 354x638
══════════════════════════════ */
const CARD_W  = 591;   /* ancho portrait */
const CARD_H  = 1063;  /* alto portrait */
const DISP_W  = 354;
const DISP_H  = 638;
const SCALE   = DISP_W / CARD_W;

/* ── TEMPLATES ── */
const TEMPLATES = [
  {
    id: 'remax-central',
    label: 'REMAX Central',
    front_url: 'https://res.cloudinary.com/dlgrhr6lh/image/upload/v1774576398/frente-remax_zhorik.png',
    back_url:  'https://res.cloudinary.com/dlgrhr6lh/image/upload/v1774576399/reverso-remax_agzjhe.png',
    is_sunrise: false,
    /* Frente REMAX: banda azul inferior — medida de la imagen: empieza ~y=875, h=165px (a full res) */
    /* Nombre en 2 líneas centrado horizontalmente en la banda */
    front_band_y: 875,
    front_band_h: 165,
    front_name_lines: 2,
    /* Reverso: área blanca x offset */
    back_white_x: 62,
  },
  {
    id: 'team-sunrise',
    label: 'Team Sunrise',
    front_url: 'https://res.cloudinary.com/dlgrhr6lh/image/upload/v1774576399/frente-sunrise_tl2bst.png',
    back_url:  'https://res.cloudinary.com/dlgrhr6lh/image/upload/v1774576401/reverso-sunrise_fofnuw.png',
    is_sunrise: true,
    /* Frente Sunrise: banda azul — empieza ~y=840, h=200px */
    /* Nombre en 1 línea centrado en el ANCHO TOTAL, encima de "TEAM SUNRISE" */
    /* "TEAM SUNRISE" ocupa la parte inferior de la banda, nombre va en el tercio superior */
    front_band_y: 840,
    front_band_h: 200,
    front_name_lines: 1,
    back_white_x: 62,
  }
];

/* ── Estado ── */
let currentUser=null, currentProfile=null, currentTenant=null;
let currentTpl=TEMPLATES[0], photoImg=null;
let fontsReady=false;

/* ── Helpers ── */
const el  = id => document.getElementById(id);
const v   = id => { const e=el(id); return e?e.value.trim():''; };

function toast(msg) {
  const t=el('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function loadImg(url) {
  return new Promise((res,rej) => {
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error('Error cargando: '+url));
    img.src=url;
  });
}

/* ── Cargar fuentes Gotham via FontFace API ── */
async function loadFonts() {
  try {
    el('font-dot').className='font-dot';
    el('font-status-text').textContent='Cargando fuentes Gotham...';

    const boldFont = new FontFace(
      'GothamNarrowBold',
      'url(https://res.cloudinary.com/dlgrhr6lh/raw/upload/v1774650941/Gotham_Narrow_Bold_arzjpl.otf)',
      { weight:'700', style:'normal' }
    );
    const lightFont = new FontFace(
      'GothamLight',
      'url(https://res.cloudinary.com/dlgrhr6lh/raw/upload/v1774650942/Gotham-Light_fqu7wc.otf)',
      { weight:'300', style:'normal' }
    );

    const [b, l] = await Promise.all([boldFont.load(), lightFont.load()]);
    document.fonts.add(b);
    document.fonts.add(l);

    fontsReady = true;
    el('font-dot').className='font-dot ok';
    el('font-status-text').textContent='Fuentes Gotham listas';
    renderCards();
  } catch(e) {
    console.warn('[fonts]', e);
    el('font-status-text').textContent='Fuentes no disponibles (usando alternativa)';
    fontsReady = false;
    renderCards();
  }
}

/* ── Auth ── */
async function doLogin() {
  const email=v('login-email'), password=el('login-password').value;
  const errEl=el('login-error'), btn=el('btn-login');
  errEl.style.display='none';
  if(!email||!password){errEl.textContent='Completa todos los campos.';errEl.style.display='block';return;}
  btn.disabled=true; btn.textContent='Ingresando...';
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){errEl.textContent='Correo o contrase\u00f1a incorrectos.';errEl.style.display='block';btn.disabled=false;btn.textContent='Ingresar';return;}
  currentUser=data.session.user;
  await loadContext();
}

async function doLogout() {
  await sb.auth.signOut();
  el('login-screen').style.display='flex';
  el('app-screen').classList.remove('visible');
}

async function loadContext() {
  try {
    const {data:profile,error}=await sb.from('users').select('*,tenants(*)').eq('auth_id',currentUser.id).single();
    if(error||!profile) throw new Error('Usuario no encontrado.');
    currentProfile=profile; currentTenant=profile.tenants;
    el('header-tenant').textContent=currentTenant.name;
    el('login-screen').style.display='none';
    el('app-screen').classList.add('visible');
    el('btn-login').disabled=false; el('btn-login').textContent='Ingresar';
    buildGrid();
    setTpl(TEMPLATES[0]);
    loadFonts();
  } catch(e) {
    el('login-error').textContent=e.message;
    el('login-error').style.display='block';
    el('btn-login').disabled=false; el('btn-login').textContent='Ingresar';
    await sb.auth.signOut();
  }
}

/* ── Template grid ── */
function buildGrid() {
  el('template-grid').innerHTML = TEMPLATES.map(t=>`
    <button class="tpl-btn" data-id="${t.id}">
      <img src="${t.front_url}" alt="${t.label}" crossorigin="anonymous">
      <div class="tpl-btn-label">${t.label}</div>
    </button>`).join('');
  el('template-grid').querySelectorAll('.tpl-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const tpl=TEMPLATES.find(t=>t.id===btn.dataset.id);
      if(tpl) setTpl(tpl);
    });
  });
}

function setTpl(tpl) {
  currentTpl=tpl;
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`.tpl-btn[data-id="${tpl.id}"]`);
  if(btn) btn.classList.add('active');
  renderCards();
}

/* ══════════════════════════════
   CANVAS — FRENTE
══════════════════════════════ */
async function renderFront(canvas) {
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(!currentTpl) return;

  /* 1. Fondo */
  try {
    const bg=await loadImg(currentTpl.front_url);
    ctx.drawImage(bg,0,0,W,H);
  } catch(e){ ctx.fillStyle='#1a2744'; ctx.fillRect(0,0,W,H); }

  /* 2. Foto del agente */
  if(photoImg) {
    /*
      Mirando el frente: el área blanca tiene:
      - Esquina sup-izq: recta (toca el borde)
      - Esquina sup-der: recta (toca el borde)
      - Esquina inf-der: recta
      - Esquina inf-izq: redondeada grande
      El área blanca ocupa prácticamente todo menos la banda azul inferior y la franja azul izquierda
      Full res (591x1063):
        x: desde 0 hasta 591 (ancho completo)
        y: desde 0 hasta ~870 (donde empieza la banda azul)
      Solo esquina inf-izq redondeada (~r=60)
    */
    const ax = 0;
    const ay = 0;
    const aw = W;
    const ah = Math.round(870 * SCALE);
    const r  = Math.round(60 * SCALE);

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(ax, ay);                          /* sup-izq: recta */
    ctx.lineTo(ax+aw, ay);                       /* sup-der: recta */
    ctx.lineTo(ax+aw, ay+ah);                    /* inf-der: recta */
    ctx.lineTo(ax+r, ay+ah);                     /* inf-izq: redondeada */
    ctx.quadraticCurveTo(ax, ay+ah, ax, ay+ah-r);
    ctx.lineTo(ax, ay);
    ctx.closePath();
    ctx.clip();

    /* Cover */
    const ratio = photoImg.width / photoImg.height;
    let sw=aw, sh=ah;
    if(ratio > aw/ah) sw=sh*ratio; else sh=sw/ratio;
    ctx.drawImage(photoImg, ax+(aw-sw)/2, ay+(ah-sh)/2, sw, sh);
    ctx.restore();
  }

  /* 3. Nombre en la banda azul inferior */
  const name = v('f-name') || 'TU NOMBRE';

  /* Gotham Narrow Bold 16pt — pero a 300dpi la tarjeta es 591px ancho
     16pt a 300dpi = 16*(300/72) = 66.7px. Ajustamos al display scale. */
  const nameFullPx = Math.round(16 * (300/72)); /* ~67px a full res */
  const displayFontSize = Math.max(Math.round(nameFullPx * SCALE), 18);

  const fontName = fontsReady ? 'GothamNarrowBold' : 'Arial Black, Arial';
  ctx.font = `bold ${displayFontSize}px ${fontName}`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const bandY = Math.round(currentTpl.front_band_y * SCALE);
  const bandH = Math.round(currentTpl.front_band_h * SCALE);
  const bandCenterX = W / 2;

  if(currentTpl.is_sunrise) {
    const nameY = bandY + Math.round(bandH * 0.30);
    ctx.fillText(name.toUpperCase(), bandCenterX, nameY);
  } else {
    const parts = name.toUpperCase().trim().split(' ');
    let line1, line2;
    if(parts.length === 1)      { line1=parts[0]; line2=''; }
    else if(parts.length === 2) { line1=parts[0]; line2=parts[1]; }
    else {
      const mid=Math.ceil(parts.length/2);
      line1=parts.slice(0,mid).join(' ');
      line2=parts.slice(mid).join(' ');
    }
    const lineSpacing = displayFontSize * 1.25;
    const totalH = line2 ? lineSpacing*2 : lineSpacing;
    const startY = bandY + (bandH - totalH)/2 + lineSpacing/2;
    ctx.fillText(line1, bandCenterX, startY);
    if(line2) ctx.fillText(line2, bandCenterX, startY + lineSpacing);
  }
}

/* ══════════════════════════════
   CANVAS — REVERSO
   Solo: QR (WhatsApp), teléfono, email, instagram
   Centrado en el área blanca (no en el ancho total)
══════════════════════════════ */
async function renderBack(canvas) {
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(!currentTpl) return;

  /* 1. Fondo */
  try {
    const bg=await loadImg(currentTpl.back_url);
    ctx.drawImage(bg,0,0,W,H);
  } catch(e){ ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); }

  /* 2. QR code
     Full res (591x1063):
     - La línea azul izquierda termina ~x=62
     - Área blanca: x=62 a x=591, centro en x=326
     - QR: tamaño reducido ~320px, con espacio arriba ~80px desde el borde
     - Debajo del QR hay el logo REMAX que ya está en la imagen (~y=540-700)
     - Texto editable va entre logo y websites (~y=710-800)
  */
  const whiteStartX = currentTpl.back_white_x;
  const whiteWidth  = CARD_W - whiteStartX;
  const whiteCenterX = Math.round((whiteStartX + whiteWidth/2) * SCALE);

  const wa = v('f-whatsapp') || '';
  const waClean = wa.replace(/\D/g,'');
  const qrData = waClean ? `https://wa.me/${waClean}` : 'https://wa.me/50600000000';
  const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(qrData)}&bgcolor=ffffff&color=000000&format=png&margin=2`;

  try {
    const qrImg = await loadImg(qrApiUrl);
    /* QR más pequeño: 320px full res, con gap de 80px arriba */
    const qSize = Math.round(320 * SCALE);
    const qx    = whiteCenterX - qSize/2;
    const qy    = Math.round(80 * SCALE);
    ctx.drawImage(qrImg, qx, qy, qSize, qSize);
  } catch(e) { console.warn('[QR]', e); }

  /* 3. Texto editable
     Posición: entre el logo REMAX Central (~y=700 full res) y los websites (~y=870)
     Solo: teléfono (9pt Gotham Light), email (5pt), instagram (5pt)
     Centrado en el área blanca
  */
  const phone     = v('f-whatsapp') || '';
  const email     = v('f-email')    || '';
  const insta     = v('f-instagram')|| '';

  /* Tamaños — 300 DPI base
     9pt  = 9*(300/72)  = 37.5px full res → display: 37.5*SCALE
     5pt  = 5*(300/72)  = 20.8px full res → display: 20.8*SCALE
     Mínimos para legibilidad en pantalla: 13px y 10px
  */
  const phonePx = Math.max(Math.round(9  * (300/72) * SCALE), 13);
  const smallPx = Math.max(Math.round(5  * (300/72) * SCALE), 10);
  const fontBase = fontsReady ? 'GothamLight' : 'Arial';

  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle    = '#111111';

  /* Espacio entre logo y websites: ~y=710 a y=860 full res */
  let ty = Math.round(715 * SCALE);
  const gapPhone = Math.round(10 * SCALE);
  const gapSmall = Math.round(7  * SCALE);

  if(phone) {
    ctx.font = `300 ${phonePx}px ${fontBase}`;
    ctx.fillText(phone, whiteCenterX, ty);
    ty += phonePx + gapPhone;
  }
  if(email) {
    ctx.font = `300 ${smallPx}px ${fontBase}`;
    ctx.fillText(email, whiteCenterX, ty);
    ty += smallPx + gapSmall;
  }
  if(insta) {
    ctx.font = `300 ${smallPx}px ${fontBase}`;
    ctx.fillText(insta.startsWith('@') ? insta : '@'+insta, whiteCenterX, ty);
  }
}

async function renderCards() {
  await Promise.all([
    renderFront(el('canvas-front')),
    renderBack(el('canvas-back'))
  ]);
}

/* ── Upload foto ── */
function uploadPhoto(file) {
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    photoImg=await loadImg(e.target.result);
    el('photo-preview').innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover" alt="">`;
    el('upload-title').textContent='Foto cargada';
    el('upload-status').textContent='Click para cambiar';
    el('upload-area').style.borderColor='#22c55e';
    renderCards();
  };
  reader.readAsDataURL(file);
}

/* ── Descargar PDF ── */
async function downloadPDF() {
  const btn=el('btn-download-pdf');
  btn.disabled=true; btn.textContent='Generando PDF...';
  try {
    if(!window.jspdf) {
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.onload=res; s.onerror=rej; document.head.appendChild(s);
      });
    }
    const {jsPDF}=window.jspdf;

    /* Renderizar a alta resolución */
    const hiFront=document.createElement('canvas');
    hiFront.width=CARD_W; hiFront.height=CARD_H;
    const hiBack=document.createElement('canvas');
    hiBack.width=CARD_W; hiBack.height=CARD_H;

    /* Temporalmente cambiar dimensiones del canvas visible para renderizar en hi-res */
    const origFW=el('canvas-front').width, origFH=el('canvas-front').height;
    el('canvas-front').width=CARD_W; el('canvas-front').height=CARD_H;
    el('canvas-back').width=CARD_W;  el('canvas-back').height=CARD_H;
    await renderCards();
    const frontData=el('canvas-front').toDataURL('image/png');
    const backData=el('canvas-back').toDataURL('image/png');
    el('canvas-front').width=origFW; el('canvas-front').height=origFH;
    el('canvas-back').width=origFW;  el('canvas-back').height=origFH;
    await renderCards();

    /* PDF: 5cm x 9cm portrait (landscape invertido) */
    const pdf=new jsPDF({orientation:'portrait', unit:'cm', format:[5,9]});
    pdf.addImage(frontData,'PNG',0,0,5,9);
    pdf.addPage([5,9],'portrait');
    pdf.addImage(backData,'PNG',0,0,5,9);

    const slug=(v('f-name')||'tarjeta').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    pdf.save(`tarjeta-${slug}.pdf`);
    toast('PDF descargado ✓');
  } catch(e){ console.error(e); toast('Error: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='Descargar PDF'; }
}

/* ── Descargar PNG ── */
async function downloadPNG() {
  const btn=el('btn-download-png');
  btn.disabled=true; btn.textContent='Generando...';
  try {
    const slug=(v('f-name')||'tarjeta').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const a1=document.createElement('a');
    a1.href=el('canvas-front').toDataURL('image/png');
    a1.download=`tarjeta-${slug}-frente.png`; a1.click();
    await new Promise(r=>setTimeout(r,400));
    const a2=document.createElement('a');
    a2.href=el('canvas-back').toDataURL('image/png');
    a2.download=`tarjeta-${slug}-reverso.png`; a2.click();
    toast('PNG descargado ✓');
  } catch(e){ toast('Error: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='Descargar PNG'; }
}

/* ── Event listeners ── */
el('btn-login').addEventListener('click', doLogin);
el('login-password').addEventListener('keydown', e=>{if(e.key==='Enter')doLogin();});
el('btn-logout').addEventListener('click', doLogout);
el('photo-upload').addEventListener('change', e=>uploadPhoto(e.target.files[0]));
el('btn-download-pdf').addEventListener('click', downloadPDF);
el('btn-download-png').addEventListener('click', downloadPNG);
['f-name','f-whatsapp','f-email','f-instagram'].forEach(id=>{
  const inp=el(id); if(inp) inp.addEventListener('input', renderCards);
});

/* ── Init ── */
sb.auth.getSession().then(({data:{session}})=>{
  if(session){currentUser=session.user; loadContext();}
});
